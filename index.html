    function getCost(pos) {
        if(islandTiles.includes(pos)) return 100000; 
        let b = boardState[pos], pData = propData[pos]; if(!pData) return 0; 
        let c = 0;
        if(b.land) c += pData.b[0]; if(b.villa) c += pData.b[1]; if(b.bldg) c += pData.b[2]; if(b.hotel) c += pData.b[3]; if(b.landmark) c += pData.b[4]; 
        return c; 
    }

    function getToll(pos) {
        let b = boardState[pos], t = 0; 
        if(b.owner === -1) return 0;
        if(b.blackoutTurns > 0) return 0; 
        
        if(islandTiles.includes(pos)) { 
            let ownerIslands = islandTiles.filter(idx => isTeam(boardState[idx].owner, b.owner)).length; 
            if(ownerIslands === 1) t = 80000; else if(ownerIslands === 2) t = 160000; else if(ownerIslands >= 3) t = 320000; 
        } else { 
            let pData = propData[pos]; if(!pData) return 0; 
            if(b.land) t += pData.t[0]; if(b.villa) t += pData.t[1]; if(b.bldg) t += pData.t[2]; if(b.hotel) t += pData.t[3]; if(b.landmark) t += pData.t[4]; 
        }
        
        if(olympicTile === pos) t *= olympicMult; 
        let colorMult = getColorMultiplier(pos, b.owner);
        t *= colorMult;

        if(b.isDusted) t /= 2; 
        return t;
    }

    function triggerAITurn() {
        let p = players[currentTurn];
        let anyAnimating = players.some(pl => pl && pl.isAnimating);
        if(!p || (isOnline && !isHost) || aiThinking || (isMoving && anyAnimating)) return;

        if(!p.isBankrupt && p.isAI) {
            aiThinking = true;
            if (aiTurnTimeout) clearTimeout(aiTurnTimeout);
            aiTurnTimeout = setTimeout(() => {
                // 실행 직전 상태 다시 한 번 확인 (안전장치)
                if(!isMoving && !targetingMode.active && !playerTargetingMode.active && players[currentTurn].id === p.id) {
                    if (useAIInventory(p)) return;
                    doAction();
                } else {
                    aiThinking = false;
                }
            }, getRandomDelay());
        }
    }

    // [V5.1] AI 아이템 사용 전략
    function useAIInventory(p) {
        if (!p.inventory || p.inventory.length === 0 || p.hasUsedCardThisTurn || p.doubleCount > 0) return false;

        // 1. 월급 부스터: 있으면 바로 씀
        let sIdx = p.inventory.findIndex(c => c.id === 7);
        if (sIdx !== -1) { useInventoryCard(p.id, sIdx); return true; }

        // 2. 신의 주사위: 독점 가능 타겟이 보이면 사용
        let gIdx = p.inventory.findIndex(c => c.id === 34);
        if (gIdx !== -1) {
            let targets = []; for(let i=2; i<=12; i++) targets.push((p.pos + i) % 32);
            let best = pickAITarget('travel', p, targets);
            if (hasMonopolyPotential(p.id, best)) { useInventoryCard(p.id, gIdx); return true; }
        }

        return false;
    }

    function pickAITarget(type, player, validTargets) {
        if(validTargets.length === 0) return -1;
        
        if(type === 'travel') {
            // [V5.9] 포츈 대전 모드 전용 세계여행 전략
            if (buildRule === 'fortune') {
                const mysteryIndices = [4, 11, 16, 19, 27];
                const others = players.filter(p => !p.isBankrupt && p.id !== player.id);
                const maxOppMoney = others.length > 0 ? Math.max(...others.map(o => o.money)) : 0;

                // 1. 자산이 너무 없을 때 (위험 회피)
                if (player.money < 300000) {
                    if (validTargets.includes(0)) return 0; // 시작점 (월급)
                    if (validTargets.includes(8)) return 8; // 무인도 (도피)
                }

                // 2. 한방 역전이 필요할 때 (재산체인지 노림수)
                if (maxOppMoney > player.money * 2) {
                    let targetMystery = mysteryIndices.filter(idx => validTargets.includes(idx));
                    if (targetMystery.length > 0 && Math.random() < 0.7) {
                        return targetMystery[Math.floor(Math.random() * targetMystery.length)];
                    }
                }

                // 3. 로또방 (일확천금 꿈)
                if (validTargets.includes(2) && Math.random() < 0.25) return 2;

                // 4. 일반적 상황: 미스터리 vs 포츈카드 vs 시작점 가중치 선택
                let r = Math.random();
                if (r < 0.4) { // 미스터리 선호
                    let targetMystery = mysteryIndices.filter(idx => validTargets.includes(idx));
                    if (targetMystery.length > 0) return targetMystery[Math.floor(Math.random() * targetMystery.length)];
                } else if (r < 0.8) { // 포츈카드 선호
                    let fortunes = validTargets.filter(idx => ![0, 2, 8, ...mysteryIndices].includes(idx));
                    if (fortunes.length > 0) return fortunes[Math.floor(Math.random() * fortunes.length)];
                }

                return validTargets.includes(0) ? 0 : validTargets[Math.floor(Math.random() * validTargets.length)];
            }

            // --- 기존 클래식 모드 전략 유지 ---
            const getOwner = (i) => boardState[i].owner;
            const isMine = (i) => isTeam(getOwner(i), player.id);
            const isOpp = (i) => getOwner(i) !== -1 && !isMine(i);

            // 1순위: 상대방 독점 저지 (최우선 전략)
            let blocks = [];
            players.forEach(opp => {
                if (opp.isBankrupt || isTeam(opp.id, player.id)) return;

                // 관광지 저지
                let oIslands = islandTiles.filter(idx => isTeam(getOwner(idx), opp.id));
                if (oIslands.length >= 4) {
                    let miss = islandTiles.find(idx => getOwner(idx) === -1 && validTargets.includes(idx));
                    if (miss !== undefined) blocks.push({idx: miss, priority: 100});
                }
                // 라인/컬러 저지
                lineGroups.forEach(lg => {
                    if (lg.filter(idx => isTeam(getOwner(idx), opp.id)).length === lg.length - 1) {
                        let miss = lg.find(idx => getOwner(idx) === -1 && validTargets.includes(idx));
                        if (miss !== undefined) blocks.push({idx: miss, priority: 90});
                    }
                });
            });
            if (blocks.length > 0) {
                blocks.sort((a,b) => b.priority - a.priority);
                return blocks[0].idx;
            }

            // 2순위: 내 독점 완성
            let wins = [];
            if (islandTiles.filter(isMine).length >= 4) {
                let miss = islandTiles.find(idx => getOwner(idx) === -1 && validTargets.includes(idx));
                if (miss !== undefined) wins.push({idx: miss, priority: 80});
            }
            lineGroups.forEach(lg => {
                if (lg.filter(isMine).length === lg.length - 1) {
                    let miss = lg.find(idx => (getOwner(idx) === -1 || !boardState[idx].landmark) && validTargets.includes(idx));
                    if (miss !== undefined) wins.push({idx: miss, priority: 70});
                }
            });
            if (wins.length > 0) {
                wins.sort((a,b) => b.priority - a.priority);
                return wins[0].idx;
            }

            // 3순위: 자금 상황에 따른 특수지
            if (player.money < 500000) {
                if (validTargets.includes(0)) return 0; // 시작점 (월급)
                if (validTargets.includes(8)) return 8; // 무인도 (도피)
            }

            // 4순위: 일반 가치 평가
            let scores = validTargets.map(idx => {
                let s = 0; let b = boardState[idx];
                if (idx === 0) s += 5000; if (idx === 24) s += 7000;
                if (b.owner === -1) {
                    s += (getCost(idx)/10000) * 100;
                    if (islandTiles.includes(idx)) s += 3000;
                } else if (isMine(idx) && !b.landmark) {
                    s += 2000;
                } else if (isOpp(idx) && !b.landmark && player.money > getToll(idx) + getCost(idx)*2 + getAISafetyBuffer(player)) {
                    s += 1500;
                }
                return {idx, s};
            });
            scores.sort((a,b) => b.s - a.s);
            return scores[0].idx;
        }
        
        if(type === 'attack') return validTargets.reduce((best, i) => getToll(i) > getToll(best) ? i : best, validTargets[0]);
        if(type === 'olympic') return validTargets.reduce((best, i) => (isTeam(boardState[i].owner, player.id) && getToll(i) > getToll(best)) ? i : best, validTargets[0]);
        if(type === 'build') return validTargets.reduce((best, i) => getCost(i) > getCost(best) ? i : best, validTargets[0]);
        
        return validTargets[Math.floor(Math.random() * validTargets.length)];
    }

    function handleBankruptcy(player, amount, creditorId, isOptional, excludePos, onCancel, onSuccess) {
        if (player.money >= amount) { 
            player.money -= amount; if(creditorId !== null && creditorId !== -1) players[creditorId].money += amount; 
            onSuccess(true); return; 
        }
        
        let myLands = []; boardState.forEach((b, i) => { if(b.owner === player.id && i !== excludePos) myLands.push(i); });
        
        if (myLands.length === 0) {
            if (isOptional) { if(!player.isAI) alert("매각할 자산이 없어 취소합니다."); onCancel(); return; } 
            else { 
                if(!player.isAI) alert(`[${player.name}] 파산했습니다!`); 
                addLog(`🚨 [${player.name}] 파산!`); 
                if(creditorId !== null && creditorId !== -1) players[creditorId].money += player.money; 
                player.money = 0; player.isBankrupt = true; 
                let pPiece = document.getElementById('p-' + player.id); if(pPiece) pPiece.style.display = 'none'; 

                if(isOnline) pushOnlineState({ forceSync: true }); // 파산은 즉시 강제 전송

                onSuccess(false);
                // 파산 즉시 게임 종료 여부 체크 (턴 안 넘기고 바로 끝내기 위함)
                setTimeout(() => { if(isOnline) pushOnlineState({ forceSync: true }); endTurnLogic(false); }, 500);
                return;
            }
        }

        if(player.isAI) {
            if(isOptional) { onCancel(); return; }
            myLands.sort((a,b) => getCost(a) - getCost(b)); 
            let sellIdx = myLands[0]; let sellPrice = getCost(sellIdx) / 2;
            boardState[sellIdx] = { owner: -1, land: false, villa: false, bldg: false, hotel: false, landmark: false, isDusted: false, dustAttackerId: -1, dustRemainingTurns: 0, blackoutTurns: 0 };
            player.money += sellPrice; if(olympicTile === sellIdx) { olympicTile = -1; olympicOwner = -1; olympicMult = 2; }
            updateBoardVisuals(); updatePlayerUI(); 
                addLog(`💰 [${player.name}] 자산 매각 (+${(sellPrice/10000).toLocaleString()}만 원)`);
            if(isOnline) pushOnlineState();
            setTimeout(() => handleBankruptcy(player, amount, creditorId, isOptional, excludePos, onCancel, onSuccess), getRandomDelay());
            return;
        }

        let sHtml = `<select id="sell-select" style="padding:8px; width:100%;">`;

    function runOlympic(player, isDouble) {
        let myLands = []; boardState.forEach((b, i) => { if(b.owner !== -1 && isTeam(b.owner, player.id)) myLands.push(i); });
        if(myLands.length === 0) { addLog(`[${player.name}] 개최할 땅이 없습니다.`); endTurnLogic(isDouble); return; }

        if(player.isAI) {
            let targetIdx = pickAITarget('olympic', player, myLands);
            setTimeout(() => {
                let safety = getAISafetyBuffer(player, targetIdx);
                if (player.money < 100000 + safety) { endTurnLogic(isDouble); return; }
                handleBankruptcy(player, 100000, -1, true, targetIdx, () => { endTurnLogic(isDouble); }, (success) => {
                    if(success) {
                        if(olympicTile === targetIdx && isTeam(olympicOwner, player.id)) olympicMult = Math.min(5, olympicMult + 1);

                    }
                    setTimeout(() => endTurnLogic(isDouble), getRandomDelay());

        let txt = player.team > 0 ? `[${player.name}]님, 개최할 내/팀 땅을 지도에서 클릭하세요!` : `[${player.name}]님, 개최할 내 땅을 지도에서 클릭하세요!`;
        startTargeting(myLands, txt + " (비용 10만원)", (targetIdx) => {

            });

    function askDefense(targetPlayer, attackName, callback, angelOnly = false) {
        // [V5.0] 가방 내부에서 방어/천사 카드 찾기
        let angelIdx = (targetPlayer.inventory || []).findIndex(c => c.short === "천사카드");
        let defIdx = (targetPlayer.inventory || []).findIndex(c => c.short === "방어카드");

        // [V5.0.6.5] 방어카드 우선순위 적용 (방어카드 먼저 소모 유도)
        let useIdx = -1;
        let cardName = "";

        if (!angelOnly && defIdx !== -1) {
            useIdx = defIdx;
            cardName = "🛡️ 방어카드";
        } else if (angelIdx !== -1) {
            useIdx = angelIdx;
            cardName = "👼 천사카드";
        }

        if (useIdx !== -1) {
            // AI는 즉시 자동 방어
            if(targetPlayer.isAI) {
                targetPlayer.inventory.splice(useIdx, 1);
                updatePlayerUI(); addLog(`🤖[${targetPlayer.name}] ${cardName}로 방어 성공!`); 
                if(isOnline) pushOnlineState();
                callback(true); return;
            }

            // 온라인 모드인 경우
            if (isOnline) {
                // 공격당하는 당사자(나)인 경우: 직접 선택
                if (targetPlayer.id === myPlayerId) {
                    let msg = `<div style="font-size:14px; margin-top:10px;">상대방이 <b>${attackName}</b>을 시도했습니다!<br>${cardName}를 사용하여 막으시겠습니까?</div>`;
                    openCustomModal("🛡️ 공격 방어", "방어 기회!", msg, true, "사용하기", "그냥 맞기", (useCard) => {
                        if(useCard) {
                            targetPlayer.inventory.splice(useIdx, 1);
                            updatePlayerUI();
                            addLog(`🛡️ [${targetPlayer.name}]님이 ${cardName}로 방어했습니다!`);

                            // [수정] 방어 결과와 내 최신 데이터(가방 차감)를 함께 강제 전송
                            pushOnlineState({
                                defenseResponse: { status: 'defended', time: Date.now() }
                            });
                            // 방어 요청 데이터 삭제
                            database.ref('rooms/' + onlineRoomId + '/defenseRequest').remove();
                            callback(true);
                        } else {
                            // 방어 거부 결과를 서버에 전송
                            database.ref('rooms/' + onlineRoomId + '/defenseResponse').set({ status: 'ignored', time: Date.now() });
                            database.ref('rooms/' + onlineRoomId + '/defenseRequest').remove();

                            // [V4.7.10] 심리전 보호: '방어 포기' 로그를 삭제하고 공격 성공만 처리하도록 변경
                            pushOnlineState();
                            callback(false);
                        }
                    });
                }
                else {
                    addLog(`⏳ [${targetPlayer.name}]님의 방어 선택을 기다리는 중...`);

                    // 이전 데이터 청소 후 새로운 요청 게시
                    database.ref('rooms/' + onlineRoomId + '/defenseResponse').remove();
                    database.ref('rooms/' + onlineRoomId + '/defenseRequest').set({ attackerId: currentTurn, targetId: targetPlayer.id, attackName: attackName, time: Date.now() });

                    const respRef = database.ref('rooms/' + onlineRoomId + '/defenseResponse');

                    // 타임아웃 관리를 위한 변수
                    let defenseTimer = null;

                    const onResp = (snap) => {
                        const val = snap.val();
                        if (val && (!window.lastDefenseRespTime || window.lastDefenseRespTime < val.time)) {
                            window.lastDefenseRespTime = val.time;
                            if (defenseTimer) clearTimeout(defenseTimer); // 응답 오면 타이머 즉시 취소
                            respRef.off('value', onResp);
                            respRef.remove();
                            if (val.status === 'defended') callback(true); else callback(false);
                        }
                    };
                    respRef.on('value', onResp);

                    // 15초 타임아웃 설정
                    defenseTimer = setTimeout(() => {
                        respRef.off('value', onResp);
                        // 아직 응답이 없는 경우에만 타격 실패 처리
                        database.ref('rooms/' + onlineRoomId).once('value').then(s => {
                            const d = s.val();
                            if (!d.defenseResponse || d.defenseResponse.time < Date.now() - 14000) {
                                database.ref('rooms/' + onlineRoomId + '/defenseRequest').remove();
                                database.ref('rooms/' + onlineRoomId + '/defenseResponse').remove();
                                addLog(`[${targetPlayer.name}]님의 응답 시간이 초과되었습니다.`);
                                callback(false);
                            }
                        });
                    }, 15000);
                }
                return;
            }

            // 오프라인 모드: 기존 로직
            let msg = `<div style="font-size:14px; margin-top:10px;">상대방이 <b>${attackName}</b>을 시도했습니다!<br>${cardName}를 사용하여 막으시겠습니까?</div>`;
            openCustomModal("🛡️ 공격 방어", "방어 기회!", msg, true, "사용하기", "그냥 맞기", (useCard) => {
                if(useCard) { 
                    targetPlayer.inventory.splice(useIdx, 1);
                    updatePlayerUI(); addLog(`🛡️ [${targetPlayer.name}]님이 ${cardName}로 방어 성공!`); callback(true);
                } else callback(false); 
            });
        } else callback(false); 
    }

    // [V5.0] 카드 획득 통합 핸들러 (즉시 실행 vs 보관/사용 선택)
    function handleCardAcquisition(player, card, isDouble, title, color) {
        // [V5.0.6.3] 즉시 사용 카드 리스트 (35:뒤로가, 26:한번더, 28:노가다 추가)

        // [V5.0.5.4] 보관 전용 리스트 (사용 버튼 제외: 천사, 방어, 탈출 / 할인 2종)
        const storeOnlyIds = [6, 9, 16, 15, 17];

        let isImmediate = immediateIds.includes(card.id);
        let isStoreOnly = storeOnlyIds.includes(card.id);

        // 가방에 이미 있는지 확인
        let alreadyHas = player.inventory && player.inventory.some(c => c.id === card.id);

        let html = `<div style="font-size:18px; font-weight:bold; color:#${color}; margin:15px 0;">[ ${card.name} ]</div>`;

        if (isImmediate) {
            // 묻지도 따지지도 않고 확인 버튼 하나만 제공
            openCustomModal(title, "이 카드는 획득 즉시 효과가 발동됩니다!", html, false, "확인 (실행)", "", () => {
                executeFortuneAction(player, card, isDouble);
            });
        } else if (isStoreOnly) {
            // 보조/방어형: 보관 또는 버리기만 가능 (즉시 사용은 무의미하므로 제외)
            html += `
                <div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
                    <button onclick="handleCardChoice('store')" style="background:#00838f; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🎒 가방에 넣기</button>
                    <button onclick="handleCardChoice('discard')" style="background:#9e9e9e; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🗑️ 버리기</button>
                </div>
            `;
            window.handleCardChoice = (choice) => {
                document.getElementById('game-modal').style.display = 'none';
                if (choice === 'store') addToInventory(player, card, isDouble);
                else { addLog(`[${player.name}] 보관용 카드를 버렸습니다.`); endTurnLogic(isDouble); }
            };
            openCustomModal(title, alreadyHas ? "이미 가방에 동일한 카드가 있습니다!" : "어떤 선택을 하시겠습니까?", html, false, "", "", () => {});
            document.getElementById('modal-confirm').style.display = 'none';
        } else {
            // 공격/유틸형: 보관 / 즉시 사용 / 버리기 3종 선택
            // [V5.0.6.1] 즉시 사용 시 별도 확인 팝업 없이 바로 executeFortuneAction으로 연결
            html += `
                <div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
                    <button onclick="handleCardChoice('store')" style="background:#00838f; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🎒 가방에 넣기</button>
                    <button onclick="handleCardChoice('use')" style="background:#f57f17; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">⚡ 즉시 사용</button>
                    <button onclick="handleCardChoice('discard')" style="background:#9e9e9e; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🗑️ 버리기</button>
                </div>
            `;
            window.handleCardChoice = (choice) => {
                document.getElementById('game-modal').style.display = 'none';
                if (choice === 'store') addToInventory(player, card, isDouble);
                else if (choice === 'use') executeFortuneAction(player, card, isDouble);
                else { addLog(`[${player.name}] 보관용 카드를 버렸습니다.`); endTurnLogic(isDouble); }
            };
            openCustomModal(title, alreadyHas ? "이미 가방에 동일한 카드가 있습니다!" : "어떤 선택을 하시겠습니까?", html, false, "", "", () => {});
            document.getElementById('modal-confirm').style.display = 'none';
        }
    }

    function addToInventory(player, card, isDouble, skipChecks = false) {
        if (!player.inventory) player.inventory = [];

        if (!skipChecks) {
            // 중복 체크 (V5.0.5.7: 팝업 제거 및 로그 처리)
            if (player.inventory.some(c => c.id === card.id)) {
                addLog(`[${player.name}] 이미 보관용 카드를 보유 중입니다.`);
                endTurnLogic(isDouble);
                return;
            }

            if (player.inventory.length >= 3) {
                if (player.isAI) {
                    // AI: 가방이 꽉 찼으면 0번 카드를 버리고 새 카드를 보관 (스마트 교체)
                    player.inventory.shift();
                    player.inventory.push(card);
                    addLog(`🤖[${player.name}] 보관용 카드를 교체했습니다.`);
                    updatePlayerUI(); if(isOnline) pushOnlineState();
                    endTurnLogic(isDouble);
                    return;
                }
                // 가방 꽉 참 -> 교체 팝업 (사람 전용)
                let html = `<div style="margin-bottom:10px;">가방이 꽉 찼습니다! 버릴 카드를 선택하세요.</div><select id="swap-card-idx" style="width:100%; padding:8px;">`;
                player.inventory.forEach((c, i) => { html += `<option value="${i}">${c.short}</option>`; });
                html += `</select>`;

                openCustomModal("🎒 가방 가득 참", "카드 교환", html, true, "교체하기", "새 카드 버리기", (confirm) => {
                    if (confirm) {
                        let idx = document.getElementById('swap-card-idx').value;
                        addLog(`[${player.name}] 보관용 카드를 교체했습니다.`);
                        player.inventory[idx] = card;
                        updatePlayerUI();
                        if(isOnline) pushOnlineState();
                        endTurnLogic(isDouble);
                    } else {
                        addLog(`[${player.name}] 새 카드 [${card.short}]를 버렸습니다.`);
                        endTurnLogic(isDouble);
                    }
                });
                return;
            }
        }

        player.inventory.push(card);
        addLog(`[${player.name}]님이 보관용 카드를 가방에 넣었습니다.`);
        updatePlayerUI();
        if(isOnline) pushOnlineState();

        // [V5.0.8.2] 무조건 턴 종료 로직을 실행하여 프리징 방지
        endTurnLogic(isDouble);
    }

    function executeFortuneAction(player, card, isDouble, fromInventory = false) {
        let logPrefix = player.isAI ? '🤖' : '';
        if (player.isAI && !fromInventory) {
            let logMsg = (card.type === 'def') ? "보관용 카드 획득" : card.short;
            addLog(`${logPrefix}[${player.name}] 포츈: ${logMsg}`);
        }

        // [V5.0.7.1] 내부 유틸리티: 턴 종료 처리용 함수
        const finishAction = (doubleVal) => {
            if (fromInventory) {
                // 가방에서 수동으로 썼다면 턴을 끝내지 않고 UI만 갱신
                isMoving = false;
                if (player.isAI) {
                    aiThinking = false;
                    setTimeout(triggerAITurn, 500); // AI인 경우 아이템 사용 후 다음 행동(주사위) 유도
                }
                updatePlayerUI(); updateRoundUI(false);
                if (isOnline) pushOnlineState();
            } else {
                endTurnLogic(doubleVal);
            }
        };

        if(card.id === 1) {
            let steps = (32 - Number(player.pos)) % 32; if(steps === 0) steps = 32;
            addLog(`${logPrefix}[${player.name}] 시작점 이동 카드 사용! (거미줄 무시)`);
            if (isOnline) {
                player.lastMoveTime = Date.now();
                player.lastMoveType = 'walk';
                player.moveSteps = steps;
                player.ignoreMoveEvents = true; // 이동 중 함정 무시
                pushOnlineState();
            }
            moveStepByStep(player, steps, 60, true).then(() => {
                // 시작점에 도착했으므로 월급 로직 수동 실행
                player.passCount = (Number(player.passCount) || 0) + 1;
                let lapBonus = Math.floor((player.passCount - 1) / 3) * 100000;
                let currentSalary = Number(baseSalary) + lapBonus;
                let salary = player.salaryBoost ? currentSalary * 2 : currentSalary;

                if (player.salaryStolenBy !== undefined && Number(player.salaryStolenBy) !== -1) {
                    let thief = players[Number(player.salaryStolenBy)];
                    if (thief) {
                        thief.money = Number(thief.money) + salary;
                        addLog(`💸 [${thief.name}]님이 [${player.name}]님의 월급을 훔쳤습니다. (${(salary/10000).toLocaleString()}만)`);
                    }
                    player.salaryStolenBy = -1;
                } else {
                    player.money = Number(player.money) + salary;
                    addLog(`💰 [${player.name}] 월급 수령 (+${(salary/10000).toLocaleString()}만 원)`);
                }
                player.salaryBoost = false;
                updatePlayerUI();

                if (buildRule === 'fortune') {
                    let luckyBonus = Math.floor(initialStartingMoney * 0.1);
                    player.money += luckyBonus;
                    addLog(`🎯 [${player.name}] 행운 지원금 +${(luckyBonus/10000).toLocaleString()}만`);
                    finishAction(isDouble);
                } else {
                    handleStartBuild(player, isDouble);
                }
            });
            return;
        }
        else if(card.id === 2) {
            addLog(`${logPrefix}[${player.name}] 무인도로 즉시 이송되었습니다.`);
            player.pos = 8;
            player.inIsland = true; player.islandTurns = 0; player.doubleCount = 0; player.isWorldTravel = false;
            updatePiecePositions(); updatePlayerUI();
            if (isOnline) pushOnlineState({ lastMoveType: 'jump' });
            finishAction(false);
            return;
        }
        else if(card.id === 3) {
            let myLands = []; boardState.forEach((b, i) => { if(b.owner !== -1 && isTeam(b.owner, player.id)) myLands.push(i); });
            if(myLands.length === 0) { addLog(`[${player.name}] 개최할 땅이 없습니다.`); finishAction(isDouble); return; }

            const finalizeOlympic = (targetIdx) => {
                handleBankruptcy(player, 100000, -1, true, targetIdx, () => { finishAction(isDouble); }, (success) => {
                    if(success) {
                        if(olympicTile === targetIdx && isTeam(olympicOwner, player.id)) olympicMult = Math.min(5, olympicMult + 1);
                        else { olympicTile = targetIdx; olympicOwner = boardState[targetIdx].owner; olympicMult = 2; }
                        updateBoardVisuals(); syncEffect('olympic', olympicTile);
                        addLog(`${logPrefix}[${player.name}] ${mapData[olympicTile]} 올림픽 ${olympicMult}배 개최!`);
                    }
                    setTimeout(() => finishAction(isDouble), 500);
                });
            };

            if(player.isAI) {
                let targetIdx = pickAITarget('olympic', player, myLands);
                setTimeout(() => finalizeOlympic(targetIdx), getRandomDelay());
            } else {
                startTargeting(myLands, `개최할 땅을 클릭하세요! (10만원)`, (idx) => finalizeOlympic(idx), () => finishAction(isDouble), player);
            }
        }
        else if(card.id === 4) {
            addLog(`${logPrefix}[${player.name}] 세계여행지로 즉시 이동했습니다.`);
            player.pos = 24;

            updatePiecePositions(); updatePlayerUI();
            if (isOnline) pushOnlineState({ lastMoveType: 'jump' });
            finishAction(false);
            return;
        }
        else if(card.id === 5) {
            let oppLands = []; boardState.forEach((b, i) => { if(b.owner !== -1 && !isTeam(b.owner, player.id)) oppLands.push(i); });
            if(oppLands.length === 0) { addLog("공격할 상대방 땅이 없습니다."); finishAction(isDouble); return; }

            let applyDustAttack = (targetIdx, targetOwner) => {
                askDefense(targetOwner, "황사 공격", (isDefended) => {
                    if(!isDefended) {
                        let affectedTiles = [targetIdx];
                        colorGroups.forEach(cg => { if (cg.includes(targetIdx) && cg.every(idx => isTeam(boardState[idx].owner, targetOwner.id))) affectedTiles = [...cg]; });
                        affectedTiles.forEach(idx => { boardState[idx].isDusted = true; boardState[idx].dustAttackerId = player.id; boardState[idx].dustRemainingTurns = 3; syncEffect('dust', idx); });
                        updateBoardVisuals();
                        addLog(`${logPrefix}[${player.name}] 황사 공격 성공!`);
                    }
                    setTimeout(() => finishAction(isDouble), 500);
                });
            };

            if(player.isAI) {
                let targetIdx = pickAITarget('attack', player, oppLands);
                setTimeout(() => applyDustAttack(targetIdx, players[boardState[targetIdx].owner]), getRandomDelay());
            } else {
                startTargeting(oppLands, `황사 공격할 땅을 클릭하세요!`, (idx) => applyDustAttack(idx, players[boardState[targetIdx].owner]), () => finishAction(isDouble), player);
            }
        }
        else if(card.id === 7) { player.salaryBoost = true; updatePlayerUI(); finishAction(isDouble); }
        else if(card.id === 8) {
            let oppBuildings = []; boardState.forEach((b, i) => { if(b.owner !== -1 && !isTeam(b.owner, player.id) && !b.landmark && (b.villa || b.bldg || b.hotel)) oppBuildings.push(i); });
            if(oppBuildings.length === 0) { addLog("파괴할 수 있는 상대방 건물이 없습니다."); finishAction(isDouble); return; }

            let applyQuake = (targetIdx) => {
                let b = boardState[targetIdx];
                askDefense(players[b.owner], "지진 공격", (isDefended) => {
                    if(!isDefended) {
                        if(b.hotel) b.hotel = false; else if(b.bldg) b.bldg = false; else if(b.villa) b.villa = false;
                        updateBoardVisuals(); syncEffect('quake', targetIdx);
                        addLog(`${logPrefix}[${player.name}] 지진 성공!`);

            if(player.isAI) {
                let targetIdx = pickAITarget('attack', player, oppBuildings);
                setTimeout(() => applyQuake(targetIdx), getRandomDelay());
            } else {
                startTargeting(oppBuildings, `지진 공격할 건물을 클릭하세요!`, (idx) => applyQuake(idx), () => finishAction(isDouble), player);
            }
        }
        else if(card.id === 10) {
            let myLands = []; boardState.forEach((b, i) => { if(b.owner === player.id && !b.landmark) myLands.push(i); });
            let opps = players.filter(p => !p.isBankrupt && p.id !== player.id && !isTeam(p.id, player.id));
            if(myLands.length === 0 || opps.length === 0) { addLog(`${logPrefix}[${player.name}] 기부할 땅이나 받을 상대가 없습니다.`); finishAction(isDouble); return; }

            let finalizeDonation = (targetIdx, targetOpp) => {
                boardState[targetIdx].owner = targetOpp.id;
                updateBoardVisuals(); syncEffect('donate', targetIdx);
                addLog(`${logPrefix}[${player.name}] 기부: ${mapData[targetIdx]} 🎁 ${targetOpp.name} 획득!`);
                if(checkMonopolyWinAndEnd(targetOpp)) return;
                setTimeout(() => finishAction(isDouble), 500);
            };

            if(player.isAI) {
                let targetIdx = myLands[0]; let targetOpp = opps[0];
                setTimeout(() => finalizeDonation(targetIdx, targetOpp), getRandomDelay());
            } else {
                startTargeting(myLands, `기부할 땅을 클릭하세요!`, (idx) => {
                    if(opps.length === 1) finalizeDonation(idx, opps[0]);
                    else startPlayerTargeting(opps.map(o=>o.id), `기부받을 상대를 선택하세요!`, (oid) => finalizeDonation(idx, players[oid]));
                }, null, player);
            }
        }
        else if(card.id === 11) {
            let oppLands = []; boardState.forEach((b, i) => { if(b.owner !== -1 && !isTeam(b.owner, player.id)) oppLands.push(i); });
            if(oppLands.length === 0) { addLog("공격할 상대방 땅이 없습니다."); finishAction(isDouble); return; }
            let applyBlackout = (targetIdx) => {
                askDefense(players[boardState[targetIdx].owner], "도시 정전", (isDefended) => {
                    if(!isDefended) { boardState[targetIdx].blackoutTurns = 5; updateBoardVisuals(); syncEffect('blackout', targetIdx); addLog(`${logPrefix}[${player.name}] ${mapData[targetIdx]} 정전!`); }
                    setTimeout(() => finishAction(isDouble), 500);
                });
            };
            if(player.isAI) setTimeout(()=>applyBlackout(pickAITarget('attack', player, oppLands)), getRandomDelay());
            else startTargeting(oppLands, `정전시킬 땅을 선택하세요!`, (idx)=>applyBlackout(idx), () => finishAction(isDouble), player);
        }
        else if(card.id === 12) {
            let myValidLands = []; let oppValidLands = [];
            boardState.forEach((b, i) => { if (b.owner === player.id && !b.landmark) myValidLands.push(i); else if (b.owner !== -1 && !isTeam(b.owner, player.id) && !b.landmark) oppValidLands.push(i); });
            if (myValidLands.length === 0 || oppValidLands.length === 0) { addLog(`교환할 수 있는 땅이 부족합니다.`); finishAction(isDouble); return; }

            let executeSingleSwap = (myT, oppT) => {
                askDefense(players[boardState[oppT].owner], "도시 체인지", (isDef) => {
                    if(!isDef) {
                        let tOppId = boardState[oppT].owner;
                        boardState[myT].owner = tOppId; boardState[oppT].owner = player.id;
                        updateBoardVisuals(); syncEffect('swap', myT); syncEffect('swap', oppT);
                        addLog(`${logPrefix}[${player.name}] 도시 교환 성공!`);
                        if(checkMonopolyWinAndEnd(player)) return;
                    }
                    setTimeout(() => finishAction(isDouble), 500);
                });
            };
            if(player.isAI) setTimeout(()=>executeSingleSwap(myValidLands[0], oppValidLands[0]), getRandomDelay());
            else startTargeting(oppValidLands, `뺏어올 땅을 선택하세요!`, (ot)=> startTargeting(myValidLands, `내어줄 내 땅을 선택하세요!`, (mt)=>executeSingleSwap(mt, ot), ()=>finishAction(isDouble), player), ()=>finishAction(isDouble), player);
        }
        else if(card.id === 13) {
            let targets = []; boardState.forEach((b, i) => { if (b.owner !== -1 && !isTeam(b.owner, player.id) && !b.landmark) targets.push(i); });
            if(targets.length === 0) { finishAction(isDouble); return; }
            let forceSell = (idx) => {
                askDefense(players[boardState[idx].owner], "강제 매각", (isDef) => {
                    if(!isDef) {
                        let tOpp = players[boardState[idx].owner]; let price = getCost(idx)/2;
                        boardState[idx] = { owner:-1, land:false, villa:false, bldg:false, hotel:false, landmark:false };
                        tOpp.money += price; syncEffect('forceSell', idx);
                        addLog(`${logPrefix}[${player.name}] ${tOpp.name}의 ${mapData[idx]} 강제매각!`);
                    }
                    setTimeout(() => finishAction(isDouble), 500);
                });
            };
            if(player.isAI) setTimeout(()=>forceSell(targets[0]), getRandomDelay());
            else startTargeting(targets, `강제매각할 땅을 선택하세요!`, (idx)=>forceSell(idx), ()=>finishAction(isDouble), player);
        }
        else if(card.id === 14) {
            let opps = players.filter(p => !p.isBankrupt && p.id !== player.id && !isTeam(p.id, player.id));
            if(opps.length === 0) { finishAction(isDouble); return; }
            let exec = (tid) => {
                askDefense(players[tid], "무인도 보내기", (isDef) => {
                    if(!isDef) {
                        players[tid].pos = 8; players[tid].inIsland = true;
                        updatePiecePositions(); updatePlayerUI(); if (isOnline) pushOnlineState({ lastMoveType: 'jump' });
                        addLog(`${logPrefix}[${player.name}] 상대를 무인도로 보냈습니다!`);
                    }
                    setTimeout(() => finishAction(isDouble), 500);
                });

            if(player.isAI) {
                let target = opps[Math.floor(Math.random() * opps.length)];
                setTimeout(()=>exec(target.id), getRandomDelay());
            }
            else startPlayerTargeting(opps.map(o=>o.id), `무인도로 보낼 상대 선택`, (oid)=>exec(oid));
        }
        else if(card.id === 15 || card.id === 16 || card.id === 17 || card.id === 6 || card.id === 9) {
            // [V5.0.7.8] AI 자동 보관 처리
            if (player.isAI) {
                addToInventory(player, card, isDouble);
                return;
            }
        }
        else if(card.id === 18) { // 월급도둑
            let opps = players.filter(p => !p.isBankrupt && p.id !== player.id && !isTeam(p.id, player.id));
            if(opps.length === 0) { finishAction(isDouble); return; }
            let exec = (tid) => {
                askDefense(players[tid], "월급도둑", (isDef) => {
                    if(!isDef) { player.salaryStolenBy = -1; players[tid].salaryStolenBy = player.id; addLog(`${logPrefix}[${player.name}] ${players[tid].name}의 월급 약탈 예정!`); if(isOnline) pushOnlineState(); }
                    setTimeout(()=>finishAction(isDouble), 500);

            if(player.isAI) {

                setTimeout(()=>exec(richestOpp.id), getRandomDelay());

            else startPlayerTargeting(opps.map(o=>o.id), `월급 훔칠 상대 선택`, (oid)=>exec(oid));

            let exec = (tid) => {
                askDefense(players[tid], "꼼짝마", (isDef) => {
                    if(!isDef) {
                        players[tid].skipNextTurn = true;

                    }
                    setTimeout(()=>finishAction(isDouble), 500);
                });

                let randomOpp = opps[Math.floor(Math.random() * opps.length)];
                setTimeout(()=>exec(randomOpp.id), getRandomDelay());

            else startPlayerTargeting(opps.map(o=>o.id), `꼼짝마 대상 선택`, (oid)=>exec(oid));

            let exec = (tid) => {
                askDefense(players[tid], "세금징수", (isDef) => {

                                addLog(`${logPrefix}[${player.name}]님이 [${players[tid].name}]에게 세금 ${(amt/10000).toLocaleString()}만 원을 징수했습니다.`);

                            }
                        });
                    }
                    setTimeout(()=>finishAction(isDouble), 500);
                });

            if(player.isAI) {

                let richestOpp = opps.sort((a, b) => b.money - a.money)[0];
                setTimeout(()=>exec(richestOpp.id), getRandomDelay());
            }
            else startPlayerTargeting(opps.map(o=>o.id), `세금 징수 대상 선택`, (oid)=>exec(oid));

        else if(card.id === 21) {

            if(opps.length === 0) { finishAction(isDouble); return; }
            let exec = (tid) => {
                askDefense(players[tid], "밑빠진독", (isDef) => {
                    if(!isDef) {
                        let rate = [0.3, 0.4, 0.5, 0.6, 0.7][Math.floor(Math.random()*5)]; let loss = Math.floor(players[tid].money*rate/10000)*10000;
                        players[tid].tempStatusIcon = '🏺💸'; // 아이콘 설정
                        handleBankruptcy(players[tid], loss, -1, false, -1, null, (succ) => {
                            if(succ) {
                                addLog(`${logPrefix}[${players[tid].name}]님의 자산 ${(loss/10000).toLocaleString()}만 원이 공중분해되었습니다! 🍯`);
                                updatePlayerUI(); if(isOnline) pushOnlineState();
                            }
                        });
                    }
                    setTimeout(()=>finishAction(isDouble), 500);
                }, true);
            };
            if(player.isAI) {
                // 지능형 타겟팅: 돈이 많은 사람을 우선 공격
                let richestOpp = opps.sort((a, b) => b.money - a.money)[0];
                setTimeout(()=>exec(richestOpp.id), getRandomDelay());
            }
            else startPlayerTargeting(opps.map(o=>o.id), `재산 뺏을 상대 선택`, (oid)=>exec(oid));
        }
        else if(card.id === 24) { // 카드훔치기
            let opps = players.filter(p => !p.isBankrupt && p.id !== player.id && !isTeam(p.id, player.id));
            if(opps.length === 0) { finishAction(isDouble); return; }
            let exec = (tid) => {
                askDefense(players[tid], "카드훔치기", (isDef) => {
                    if(!isDef) {
                        let t = players[tid];
                        if(t.inventory && t.inventory.length > 0) {
                            let pickIdx = Math.floor(Math.random() * t.inventory.length);
                            let stolen = t.inventory.splice(pickIdx, 1)[0];
                            if(!player.inventory) player.inventory = [];
                            player.inventory.push(stolen);
                            addLog(`${logPrefix}[${player.name}] [${t.name}]님의 보관용 카드를 약탈했습니다!`);
                            updatePlayerUI();
                        } else addLog(`[${t.name}]님은 훔칠 카드가 없습니다.`);
                    }
                    setTimeout(()=>finishAction(isDouble), 500);
                });
            };
            if(player.isAI) {
                // 카드를 가진 사람 중 랜덤 선택
                let oppsWithCards = opps.filter(o => o.inventory && o.inventory.length > 0);
                let target = oppsWithCards.length > 0 ? oppsWithCards[Math.floor(Math.random() * oppsWithCards.length)] : opps[Math.floor(Math.random() * opps.length)];
                setTimeout(()=>exec(target.id), getRandomDelay());
            }
            else startPlayerTargeting(opps.map(o=>o.id), `카드를 훔칠 상대 선택`, (oid)=>exec(oid));
        }
        else if(card.id === 25) { triggerLotto(player, isDouble, () => finishAction(isDouble)); }
        else if(card.id === 26) { addLog(`${logPrefix} 한번더! 주사위 추가 기회`); finishAction(true); }
        else if(card.id === 27) {
            let coin = (choice) => {
                let res = Math.random() < 0.5; let succ = (choice === res);
                let win = getFortunePenalty(0.2); let lose = getFortunePenalty(0.15);

                let resTxt = succ ? `<b style="color:#00838f;">성공! (+${(win/10000).toLocaleString()}만)</b>` : `<b style="color:#d32f2f;">실패... (-${(lose/10000).toLocaleString()}만)</b>`;
                let resultMsg = `<div style="font-size:16px; text-align:center; margin:15px 0;">동전 결과: <b>${res ? '앞면' : '뒷면'}</b><br><br>${resTxt}</div>`;

                if(succ) {
                    player.money += win;
                    addLog(`${logPrefix}[${player.name}] 도박 성공! (+${(win/10000).toLocaleString()}만)`);
                } else {
                    handleBankruptcy(player, lose, -1, false, -1, null, (s)=>{
                        if(s) addLog(`${logPrefix}[${player.name}] 도박 실패! (-${(lose/10000).toLocaleString()}만)`);
                    });
                }
                updatePlayerUI();

                if(!player.isAI) {
                    openCustomModal("🎲 도박 결과", "", resultMsg, false, "확인", "", () => {
                        setTimeout(()=>finishAction(isDouble), 500);
                    });
                } else {
                    setTimeout(()=>finishAction(isDouble), 1000);
                }
            };
            if(player.isAI) coin(Math.random()<0.5); else openCustomModal("🎲 도박꾼", "앞면/뒷면 선택", "", true, "앞면", "뒷면", (c)=>coin(c));
        }
        else if(card.id === 28) { // 노가다
            player.laborExpertLevel = (player.laborExpertLevel || 0) + 1;
            let bonus = (player.laborExpertLevel - 1) * 100000;
            let totalSalary = 300000 + bonus;
            player.money += totalSalary;
            updatePlayerUI();
            addLog(`${logPrefix}[${player.name}] 노가다(Lv.${player.laborExpertLevel}) 일당 ${(totalSalary/10000).toLocaleString()}만 원 지급`);
            setTimeout(()=>finishAction(isDouble), 500);
        }
        else if(card.id === 29) { // 행복나눔
            let recips = players.filter(p => !p.isBankrupt && p.id !== player.id);
            let per = getFortunePenalty(0.06);
            handleBankruptcy(player, per*recips.length, -1, false, -1, null, (succ) => {
                if(succ) {
                    recips.forEach(r => r.money+=per);
                    addLog(`${logPrefix}[${player.name}]님이 모두에게 ${(per/10000).toLocaleString()}만 원씩 기부했습니다. ❤️`);
                }
                updatePlayerUI(); setTimeout(()=>finishAction(isDouble), 500);
            });
        }
        else if(card.id === 30) { // 탈세자
            let penalty = getFortunePenalty(0.2);
            handleBankruptcy(player, penalty, -1, false, -1, null, (succ) => {
                if(succ) addLog(`${logPrefix} 탈세 적발! 벌금 납부`);
                updatePlayerUI(); setTimeout(()=>finishAction(isDouble), 500);
            });
        }
        else if(card.id === 31) { // 너와나
            let others = players.filter(p => !p.isBankrupt && p.id !== player.id);
            if(others.length === 0) { finishAction(isDouble); return; }
            let exec = (tid) => {
                let targetOpp = players[tid];
                let myP = player.pos; let oppP = targetOpp.pos;

                // 위치 교환
                player.pos = oppP;
                targetOpp.pos = myP;

                // 상대방 상태 처리 (무인도나 세계여행일 때만 기능 상속)
                targetOpp.inIsland = false;
                targetOpp.isWorldTravel = false;
                if (targetOpp.pos === 8) { targetOpp.inIsland = true; targetOpp.islandTurns = 0; }
                else if (targetOpp.pos === 24) { targetOpp.isWorldTravel = true; }

                addLog(`🤝 [${player.name}] ↔ [${targetOpp.name}] 위치 교환!`);
                syncEffect('swapPos', player.pos); syncEffect('swapPos', targetOpp.pos);
                updatePiecePositions(); updatePlayerUI();
                if(isOnline) pushOnlineState({ lastMoveType: 'jump' });

                // 본인은 바뀐 위치의 효과를 즉시 수행
                setTimeout(() => handleTileEvent(player, isDouble), 800);
            };
            if(player.isAI) {
                let target = others[Math.floor(Math.random() * others.length)];
                exec(target.id);
            }
            else startPlayerTargeting(others.map(o=>o.id), `위치를 바꿀 상대 선택`, (oid)=>exec(oid));
        }
        else if(card.id === 32) { player.bombTurns = 5; updatePlayerUI(); addLog(`${logPrefix} 💣 폭탄 장착!`); finishAction(isDouble); }
        else if(card.id === 33) { // 거미줄
            let targets = []; for(let i=0; i<=3; i++) targets.push((player.pos - i + 32) % 32);
            let exec = (tIdx) => {
                boardState[tIdx].hasWeb = true; boardState[tIdx].webTurns = 5;
                updateBoardVisuals(); addLog(`${logPrefix} 🕸️ 거미줄 설치!`);
                setTimeout(() => finishAction(isDouble), 500);
            };
            if(player.isAI) exec(targets[0]);
            else startTargeting(targets, `거미줄 설치 위치 선택`, (tIdx)=>exec(tIdx));
        }
        else if(card.id === 34) { // 신의 주사위
            if (player.isAI) {
                let best = pickAITarget('travel', player, Array.from({length:11}, (_,i)=> (player.pos+i+2)%32 ));
                let steps = (best - player.pos + 32) % 32;
                addLog(`✨ 🤖[${player.name}] 신의 주사위 발동! 모든 디버프 해제 및 ${steps}칸 선택`);

                // [최강 상향] 모든 상태 이상 해제
                player.inIsland = false; player.islandTurns = 0;
                player.skipNextTurn = false; player.moveBackNextTurn = false; player.bombTurns = 0;

                // [V5.8] AI 신의 주사위 이동 속도 2배 (100ms) + 거미줄 무시(true)
                player.extraTurn = true;
                moveStepByStep(player, steps, 100, true).then(() => {
                    setTimeout(() => handleTileEvent(player, true), 800);
                });
            } else {
                isMoving = true;
                let html = `<div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:6px; margin:10px 0;">`;
                for(let n=2; n<=12; n++) {
                    html += `<button id="god-btn-${n}" onclick="handleGodDice(${n})" style="padding:10px 0; font-size:16px; background:#e0f7fa; color:#00838f; border:2px solid #00838f; border-radius:8px; font-weight:bold; cursor:pointer;">${n}</button>`;
                }
                html += `</div><div style="font-size:12px; color:#666;">이동할 숫자를 선택하세요! (모든 디버프가 해제됩니다)</div>`;
                window.handleGodDice = (steps) => {
                    document.getElementById('game-modal').style.display = 'none';
                    addLog(`✨ [${player.name}] 신의 주사위 발동! 모든 디버프 해제 및 ${steps}칸 이동!`);

                    // [최강 상향] 모든 상태 이상 해제
                    player.inIsland = false; player.islandTurns = 0;
                    player.skipNextTurn = false; player.moveBackNextTurn = false; player.bombTurns = 0;

                    if (isOnline) pushOnlineState({ lastMoveType: 'walk', moveSteps: steps });
                    player.extraTurn = true;
                    // 거미줄 무시(true) 옵션 추가
                    moveStepByStep(player, steps, 100, true).then(() => {
                        setTimeout(() => {
                            handleTileEvent(player, true);
                        }, 800);
                    });
                };
                openCustomModal("🎲 신의 주사위", "최강의 선택! 원하는 숫자로 즉시 이동하세요.", html, false, "", "", () => {});
                document.getElementById('modal-confirm').style.display = 'none';
            }
        }
        else if(card.id === 35) { player.moveBackNextTurn = true; updatePlayerUI(); addLog(`${logPrefix} ↩️ 다음턴 역주행!`); finishAction(isDouble); }

        // 위에서 return하지 않은 나머지 일반적인 경우
    }

    async function moveBackStepByStep(player, steps) {
        if (!player) return;
        player.isAnimating = true;
        let isController = (Number(player.id) === Number(myPlayerId)) || (isOnline && isHost && player.isAI) || !isOnline;
        if (isController) isMoving = true;

        let logPrefix = player.isAI ? '🤖' : '';
        try {
            for (let i = 0; i < steps; i++) {
                player.pos = (Number(player.pos) - 1 + 32) % 32;

                // 거미줄 체크 (역방향 이동 시에도 동일하게 적용)
                if (boardState[player.pos] && boardState[player.pos].hasWeb) {
                    player.stoppedByWeb = true;
                    addLog(`${logPrefix}[${player.name}] 🕸️ 거미줄 정지!`);
                    boardState[player.pos].hasWeb = false;
                    boardState[player.pos].webTurns = 0;
                    updateBoardVisuals();
                    updatePiecePositions();
                    break;
                }

                updatePiecePositions();
                await new Promise(r => setTimeout(r, 200)); // 부드러운 역방향 걷기
            }
        } finally {
            player.isAnimating = false;
            if (!isController) {
                isMoving = false; // 관찰자만 여기서 해제
            }
            if (isOnline && isController) pushOnlineState({ lastMoveType: 'walk' });
        }
    }

    // [V5.0] 가방에 보관 중인 카드 사용 로직
    function useInventoryCard(playerIdx, itemIdx) {
        let p = players[playerIdx];
        if (!p || !p.inventory || !p.inventory[itemIdx]) return;

        // [V5.0.6.0] 전략적 사용 제한
        if (p.hasUsedCardThisTurn || p.doubleCount > 0) {
            alert("한 턴에 카드는 1장만 사용할 수 있으며, 더블 기회 중에는 사용이 불가능합니다.");
            return;
        }

        let card = p.inventory[itemIdx];

        // 방어/자동형 카드는 클릭으로 사용 불가 (상황 발생 시 자동 팝업)
        if (card.type === 'def') {
            alert(`[${card.short}]은(는) 상황이 발생했을 때 자동으로 사용 여부를 묻는 카드입니다.`);
            return;
        }

        // 팝업 없이 즉시 사용
        addLog(`🎒 [${p.name}] 가방에서 [${card.short}] 사용!`);
        p.inventory.splice(itemIdx, 1);
        p.hasUsedCardThisTurn = true;

        isMoving = true; // [V5.0] 카드 사용 시 즉시 UI 잠금 (중복 주사위 방지)
        updatePlayerUI();
        updateRoundUI();
        if (isOnline) pushOnlineState();

        // 실제 카드 효과 실행 (가방 사용 시엔 턴을 종료하지 않음)
        executeFortuneAction(p, card, false, true);
    }

    function executeTollAndAcquire(player, pos, toll, isDouble, b) {
        let owner = players[b.owner];
        
        function clearEffects() {
            if(b.isDusted) { b.isDusted = false; b.dustAttackerId = -1; b.dustRemainingTurns = 0; addLog(`황사 효과 소멸!`); }
            if(pos === olympicTile) { olympicTile = -1; olympicOwner = -1; olympicMult = 2; addLog(`올림픽 효과 소멸!`); }
            updateBoardVisuals();
        }

        function promptAcquire() {
            if(islandTiles.includes(pos) || b.landmark) { endTurnLogic(isDouble); return; }
            let originalCost = getCost(pos) * 2; 

            let askAcquire = (acqCost) => {
                if(player.money < acqCost) { endTurnLogic(isDouble); return; }
                let remain = player.money - acqCost;
                let remainTxt = remain < 0 ? `<span style="color:#d32f2f;">${(remain/10000).toLocaleString()}만 (부족)</span>` : `<span style="color:#00838f;">${(remain/10000).toLocaleString()}만</span>`;
                let html = `<div style="text-align:left; background:#f9f9f9; padding:10px; border-radius:5px; margin-bottom:10px;">• <b>인수 비용:</b> <span style="color:#d32f2f;">${(acqCost/10000).toLocaleString()}만 원</span><br>👉 예상 잔여 자산: <b>${remainTxt}</b></div>`;

                if(player.isAI) {
                    setTimeout(() => {
                        let safety = getAISafetyBuffer(player, pos);
                        if((player.money - acqCost) >= safety) {
                            handleBankruptcy(player, acqCost, b.owner, true, pos, () => endTurnLogic(isDouble), (success) => {
                                if(success) {
                                    b.owner = player.id; b.isDusted = false; b.dustAttackerId = -1; b.dustRemainingTurns = 0; 
                                    addLog(`🏢 [${player.name}] ${mapData[pos]} 인수 (-${(acqCost/10000).toLocaleString()}만 원)`);
                                    updateBoardVisuals();
                                    checkMonopolyWarnings();
                                    if(checkMonopolyWinAndEnd(player)) return;
                                    setTimeout(() => { showBuildModal(player, pos, isDouble); }, getRandomDelay());
                                } else endTurnLogic(isDouble);
                            });
                        } else endTurnLogic(isDouble);
                    }, getRandomDelay());
                    return;
                }

                openCustomModal("🏢 도시 인수", "방금 통행료를 지불한 도시를 인수하시겠습니까?", html, true, "인수하기", "패스", (wantAcquire) => {
                    if(wantAcquire) {
                        handleBankruptcy(player, acqCost, b.owner, true, pos, () => endTurnLogic(isDouble), (success) => {
                            if(success) {
                                b.owner = player.id; b.isDusted = false; b.dustAttackerId = -1; b.dustRemainingTurns = 0; 
                                addLog(`[${player.name}] ${mapData[pos]} 인수! (-${(acqCost/10000).toLocaleString()}만)`);
                                updateBoardVisuals();
                                checkMonopolyWarnings();
                                if(checkMonopolyWinAndEnd(player)) return;
                                setTimeout(() => { showBuildModal(player, pos, isDouble); }, 300);
                            } else endTurnLogic(isDouble);
                        });
                    } else endTurnLogic(isDouble);
                });
            };

            // [V5.0] 가방에서 인수할인카드(ID 17) 찾기
            let acqCardIdx = (player.inventory || []).findIndex(c => c.id === 17);
            if (acqCardIdx !== -1) {
                if (player.isAI) {
                    player.inventory.splice(acqCardIdx, 1);
                    addLog(`🤖[${player.name}] 인수할인카드 사용!`);
                    askAcquire(originalCost / 2);
                } else {
                    openCustomModal("🤝 인수할인카드 사용", "인수 비용 반값!", "인수할인카드를 사용하시겠습니까?", true, "사용하기", "아껴두기", (use) => {
                        if (use) {
                            player.inventory.splice(acqCardIdx, 1);
                            updatePlayerUI(); addLog(`[${player.name}] 인수할인카드 사용!`); askAcquire(originalCost / 2);
                        }
                        else askAcquire(originalCost);
                    });
                }
            } else askAcquire(originalCost);
        }

        if(toll > 0) {
            let remain = player.money - toll; 
            let remainTxt = remain < 0 ? `<span style="color:#d32f2f;">${(remain/10000).toLocaleString()}만 (부족)</span>` : `<span style="color:#00838f;">${(remain/10000).toLocaleString()}만</span>`;
            let title = (islandTiles.includes(pos) || b.landmark) ? (islandTiles.includes(pos) ? "🏝️ 관광지 도착" : "🏰 랜드마크 도착") : "💰 통행료 지불";
            let html = `<div style="text-align:left; background:#f9f9f9; padding:10px; border-radius:5px; margin-bottom:10px;">통행료 <b style="color:#d32f2f;">${(toll/10000).toLocaleString()}만 원</b>을 지불해야 합니다.<br>👉 예상 잔여 자산: <b>${remainTxt}</b></div>`;

            if(player.isAI) {
                setTimeout(() => {
                    handleBankruptcy(player, toll, b.owner, false, -1, null, (success) => {
                        if(success) { addLog(`🤖[${player.name}] ${owner.name}에게 통행료 ${(toll/10000).toLocaleString()}만 지불`); clearEffects(); setTimeout(promptAcquire, 500); } 
                        else endTurnLogic(isDouble);
                    });
                }, getRandomDelay());
                return;
            }
            
            openCustomModal(title, `${owner.name}님의 땅입니다.`, html, false, "통행료 지불", "", () => {
                handleBankruptcy(player, toll, b.owner, false, -1, null, (success) => {
                    if(success) { addLog(`💸 [${player.name}] 통행료 지불 (-${(toll/10000).toLocaleString()}만 원) → [${owner.name}] (+${(toll/10000).toLocaleString()}만 원)`); clearEffects(); promptAcquire(); }
                    else endTurnLogic(isDouble);
                });
            });
        } else {
            promptAcquire();
        }
    }

    function processTollAndAcquire(player, pos, isDouble) {
        let b = boardState[pos];
        let isBlackout = b.blackoutTurns > 0;
        let toll = getToll(pos); 

        let executeWithToll = (finalToll) => {
            if (isBlackout) {
                b.blackoutTurns = 0;
                addLog(`⚡ 누군가 방문하여 ${mapData[pos]} 정전 복구됨!`);
                updateBoardVisuals();
            }
            executeTollAndAcquire(player, pos, finalToll, isDouble, b);
        };

        let checkCoupon = (currentToll) => {
            // [V5.0] 가방에서 통행료할인카드(ID 15) 찾기
            let disCardIdx = (player.inventory || []).findIndex(c => c.id === 15);
            if (currentToll > 0 && disCardIdx !== -1) {
                if (player.isAI) {
                    player.inventory.splice(disCardIdx, 1);
                    addLog(`🤖[${player.name}] 통행료할인카드 사용! 통행료 반값`);
                    executeWithToll(currentToll / 2);
                } else {
                    openCustomModal("🎟️ 통행료할인카드 사용", "통행료 반값!", `통행료 <b>${(currentToll/10000).toLocaleString()}만 원</b>입니다. 통행료할인카드를 사용하시겠습니까?`, true, "사용하기", "아껴두기", (use) => {
                        if (use) {
                            player.inventory.splice(disCardIdx, 1);
                            updatePlayerUI(); currentToll /= 2; addLog(`[${player.name}] 통행료할인카드 사용! 통행료 반값`);
                        }
                        executeWithToll(currentToll);
                    });
                }
            } else executeWithToll(currentToll);
        };

        // [V5.0] 가방에서 천사카드(ID 6) 찾기
        let angelCardIdx = (player.inventory || []).findIndex(c => c.id === 6);

    function handleStartBuild(player, isDouble) {
        if (buildRule === 'fortune') { endTurnLogic(isDouble); return; }
        let myLands = [];
        let maxLvl = getMaxBuildLevel(player); 
        boardState.forEach((b, i) => { 
            if(isTeam(b.owner, player.id) && !b.landmark && !islandTiles.includes(i)) {
                let canBuild = (!b.land) || (!b.villa && maxLvl >= 1) || (!b.bldg && maxLvl >= 2) || (!b.hotel && maxLvl >= 3) || (b.hotel && maxLvl >= 4);
                if (canBuild) myLands.push(i);
            }
        });
        
        if(myLands.length > 0) {
            if(player.isAI) {
                setTimeout(() => {
                    let targetIdx = pickAITarget('build', player, myLands);
                    showBuildModal(player, targetIdx, isDouble); 
                }, getRandomDelay());
                return;
            }
            let txt = player.team > 0 ? `[${player.name}]님, 원격 건설할 내/팀 땅을 클릭하세요.` : `[${player.name}]님, 원격 건설할 내 땅을 클릭하세요.`;
            startTargeting(myLands, txt, (targetIdx) => { setTimeout(() => { showBuildModal(player, targetIdx, isDouble); }, 200); }, () => endTurnLogic(isDouble), player);
        } else endTurnLogic(isDouble);
    }
