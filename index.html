    async function doAction() {
        if(isMoving) return; const p = players[currentTurn]; if(!p) return;
        p.extraTurn = false; // [V5.9.8] 추가 턴 플래그 소모
        p.tempStatusIcon = null; // [V6.1] 턴 시작 시 공격받았던 아이콘 초기화


        // [중요] 온라인 모드 실행 권한 체크
        if (isOnline) {
            let isMyRealTurn = (Number(p.id) === Number(myPlayerId));
            let isHostControllingAI = (isHost && p.isAI);
            // 내가 조종할 권한이 없다면 실행 차단
            if (!isMyRealTurn && !isHostControllingAI) {
                aiThinking = false; // 권한 없을 경우 플래그 해제
                return;
            }
        }

        // 버튼 중복 클릭 원천 차단
        isMoving = true;

        try {
            if (p.skipNextTurn) {
                p.skipNextTurn = false;
                if (p.isWorldTravel) {
                    p.isWorldTravel = false;
                    addLog(`[${p.name}]님은 꼼짝마 효과로 세계여행 기회를 잃었습니다!`);
                }
                addLog(`[${p.name}]님은 꼼짝마 효과로 이번 턴을 쉽니다.`);
                setTimeout(() => endTurnLogic(false), 1000);
                return;
            }

            if (p.isWorldTravel) {
                if(p.isAI) {
                    setTimeout(async () => {
                        p.isWorldTravel = false; let valid = []; for(let i=0; i<32; i++) if(i !== 24) valid.push(i);
                        let target = pickAITarget('travel', p, valid);
                        let steps = (Number(target) - Number(p.pos) + 32) % 32; if (steps === 0) steps = 32;
                        addLog(`🤖[${p.name}] 세계여행: ${mapData[target]} 이동`);

                        let targetEl = document.getElementById(`cell-box-${target}`);
                        let pin = document.createElement('div');
                        pin.className = 'dest-pin'; pin.innerHTML = '📍';
                        targetEl.appendChild(pin);
                        targetEl.classList.add('destination-mark');
                        targetEl.classList.add('effect-active');

                        if (isOnline) {
                            p.lastMoveTime = Date.now();
                            p.lastMoveType = 'walk';
                            p.moveSteps = steps;
                            pushOnlineState();
                        }

                        await moveStepByStep(p, steps, 100);

                        targetEl.classList.remove('destination-mark');
                        targetEl.classList.remove('effect-active');
                        if(pin.parentNode) pin.parentNode.removeChild(pin);

                        setTimeout(() => handleTileEvent(p, p.doubleCount > 0), 800);
                    }, getRandomDelay());
                    return;
                }
                let valid = []; for(let i=0; i<32; i++) if(i !== 24) valid.push(i);
                startTargeting(valid, `[${p.name}]님, 이동할 목적지를 클릭하세요!`, async (target) => {
                    p.isWorldTravel = false; let steps = (Number(target) - Number(p.pos) + 32) % 32; if (steps === 0) steps = 32;
                    addLog(`[${p.name}] 세계여행: ${mapData[target]} 이동`);

                    let targetEl = document.getElementById(`cell-box-${target}`);
                    let pin = document.createElement('div');
                    pin.className = 'dest-pin'; pin.innerHTML = '📍';
                    targetEl.appendChild(pin);
                    targetEl.classList.add('destination-mark');
                    targetEl.classList.add('effect-active'); 

                    if (isOnline) {
                        p.lastMoveTime = Date.now();
                        p.lastMoveType = 'walk';
                        p.moveSteps = steps;
                        pushOnlineState();
                    }

                    await moveStepByStep(p, steps, 60);

                    targetEl.classList.remove('destination-mark');
                    targetEl.classList.remove('effect-active');
                    if(pin.parentNode) pin.parentNode.removeChild(pin);

                    setTimeout(() => handleTileEvent(p, p.doubleCount > 0), 800);
                }, null, p);
                return;
            }

            // [V5.0] 가방에서 무인도 탈출카드(ID 16) 찾기
            let escCardIdx = (p.inventory || []).findIndex(c => c.id === 16);
            if (p.inIsland && escCardIdx !== -1) {
                let useEscape = false;
                if (p.isAI) {
                    useEscape = true;
                    addLog(`🤖[${p.name}] 무인도 탈출카드 사용!`);
                } else {
                    useEscape = await new Promise(resolve => {
                        openCustomModal("🚁 무인도 탈출카드", "즉시 탈출 후 더블!", "탈출카드를 사용해 즉시 무인도를 벗어나고 더블 효과로 주사위를 굴리시겠습니까?", true, "사용하기", "아껴두기", res => resolve(res));
                    });
                    if(useEscape) addLog(`[${p.name}] 무인도 탈출카드 사용!`);
                }
                if (useEscape) {
                    p.inventory.splice(escCardIdx, 1); // 가방에서 제거
                    p.inIsland = false;
                    p.islandTurns = 0;
                    p.usedEscapeCard = true;
                    updatePlayerUI();
                    if (isOnline) pushOnlineState();
                }
            }

            playDiceSound();
            document.getElementById('action-btn').disabled = true;

            const d1El = document.getElementById('dice1'); const d2El = document.getElementById('dice2');
            d1El.classList.remove('double-shake'); d2El.classList.remove('double-shake');

            let isOdd = document.getElementById('opt-odd').checked;
            let isEven = document.getElementById('opt-even').checked;
            let isLow = document.getElementById('opt-low').checked;
            let isHigh = document.getElementById('opt-high').checked;

            let opt1 = isOdd ? 'odd' : (isEven ? 'even' : 'none');
            let opt2 = isLow ? 'low' : (isHigh ? 'high' : 'none');
            let hasControl = (opt1 !== 'none' || opt2 !== 'none');

            if (p.diceControlCount <= 0) hasControl = false;

            if (p.isAI) {
                hasControl = false; opt1 = 'none'; opt2 = 'none';
                if (p.diceControlCount > 0) {
                    if (p.inIsland) {
                        opt1 = 'even'; hasControl = true; addLog(`🤖[${p.name}] 🎲 짝 컨트롤 시도!`);
                    } else {
                        let validTargets = []; for(let i=2; i<=12; i++) {
                            let targetIdx = (p.pos + i) % 32;
                            if (targetIdx !== undefined) validTargets.push(targetIdx);
                        }
                        let bestTarget = pickAITarget('travel', p, validTargets);
                        let dist = (bestTarget - p.pos + 32) % 32;

                        let targetOpt1 = (dist % 2 === 0) ? 'even' : 'odd';
                        let targetOpt2 = (dist <= 6) ? 'low' : 'high';

                        let aiOptNames = [];
                        if (Math.random() > 0.4) { opt1 = targetOpt1; aiOptNames.push(opt1==='odd'?'홀':'짝'); }
                        if (Math.random() > 0.4) { opt2 = targetOpt2; aiOptNames.push(opt2==='low'?'낮음':'높음'); }

                        if (aiOptNames.length > 0) {
                            hasControl = true;
                            addLog(`🤖[${p.name}] 🎲 ${aiOptNames.join('+')} 컨트롤 시도!`);
                        }
                    }
                }
            }
            
            // [V5.2] 온라인 모드: 주사위 굴리기 시작 신호 전송
            if (isOnline) {
                pushOnlineState({ lastDiceRoll: { status: 'rolling', time: Date.now(), rollerId: myPlayerId } });
            }

            d1El.classList.add('dice-rolling'); d2El.classList.add('dice-rolling');
            let rollInterval = setInterval(() => { d1El.innerText = Math.floor(Math.random() * 6) + 1; d2El.innerText = Math.floor(Math.random() * 6) + 1; }, 50);
            await new Promise(r => setTimeout(r, 1200));
            clearInterval(rollInterval);
            d1El.classList.remove('dice-rolling'); d2El.classList.remove('dice-rolling');

            let d1, d2, total;
            let controlProb = p.isAI ? 0.7 : 1.0;
            let isControlled = hasControl && (Math.random() < controlProb);

            let loopLimit = 0;
            while(loopLimit < 200) {
                d1 = Math.floor(Math.random() * 6) + 1;
                d2 = Math.floor(Math.random() * 6) + 1;
                total = d1 + d2;
                if (!isControlled) break;

                let pass1 = true, pass2 = true;
                if (opt1 === 'odd' && total % 2 === 0) pass1 = false;
                if (opt1 === 'even' && total % 2 !== 0) pass1 = false;
                if (opt2 === 'low' && (total < 2 || total > 6)) pass2 = false;
                if (opt2 === 'high' && (total < 7 || total > 12)) pass2 = false;

                if (pass1 && pass2) break;
                loopLimit++;
            }

            if (isControlled) {
                p.diceControlCount--;
                updatePlayerUI();
            }

            d1El.innerText = d1; d2El.innerText = d2;
            let isDouble = (d1 === d2);

            // [V5.2] 온라인 모드: 주사위 결과 확정 신호 전송
            if (isOnline) {
                pushOnlineState({ lastDiceRoll: { d1, d2, status: 'finished', time: Date.now(), rollerId: myPlayerId } });
            }

            document.querySelectorAll('#dice-control input[type="checkbox"]').forEach(c => c.checked = false);
            if (isDouble) { d1El.classList.add('double-shake'); d2El.classList.add('double-shake'); if (!p.inIsland) p.doubleCount++; } else { p.doubleCount = 0; }

            if (p.doubleCount === 3) {
                addLog(`[${p.name}] 🚨 3연속 더블! 무인도 강제 이송`);
                let steps = (8 - Number(p.pos) + 32) % 32; if(steps === 0) steps = 32;

                if (isOnline) {
                    p.lastMoveTime = Date.now();
                    p.lastMoveType = 'walk';
                    p.moveSteps = steps;
                    p.ignoreMoveEvents = true; // 강제 압송 중 이벤트 무시
                    pushOnlineState();
                }

                moveStepByStep(p, steps, 60, true).then(() => {
                    p.inIsland = true; p.islandTurns = 0; p.doubleCount = 0; p.isWorldTravel = false;
                    updatePlayerUI();
                    endTurnLogic(false);
                });
                return;
            }

            if (p.inIsland) {
                p.doubleCount = 0; p.islandTurns++;
                if (p.islandTurns < 3) {
                    if (isDouble) { p.inIsland = false; p.islandTurns = 0; addLog(`[${p.name}] ${p.islandTurns}턴째 더블! 무인도 탈출 (다시 굴리기 없음)`); isDouble = false; }
                    else { addLog(`[${p.name}] 무인도 탈출 실패 (${p.islandTurns}회 시도)`); updatePlayerUI(); setTimeout(() => endTurnLogic(false), 1000); return; }
                } else { p.inIsland = false; p.islandTurns = 0; addLog(`[${p.name}] 3번째 시도! 무인도 자동 탈출`); }
            }

            p.usedEscapeCard = false;
            let logPrefix = p.isAI ? '🤖' : '';
            addLog(`${logPrefix}[${p.name}] 주사위 ${total} ${isDouble ? '(더블)' : ''}`);

            // [V5.0.6.4] 이동 방향 결정 (역방향 효과 체크)
            if (p.moveBackNextTurn) {
                p.moveBackNextTurn = false;
                addLog(`↩️ [${p.name}] 뒤로가기 저주 발동! 거꾸로 걷습니다.`);
                if (isOnline) {
                    p.lastMoveTime = Date.now();
                    p.lastMoveType = 'walk';
                    p.moveSteps = total;
                    pushOnlineState();
                }
                await moveBackStepByStep(p, total);
            } else {
                if (isOnline) {
                    p.lastMoveTime = Date.now();
                    p.lastMoveType = 'walk';
                    p.moveSteps = total;
                    pushOnlineState();
                }
                await moveStepByStep(p, total, 200);
            }

            setTimeout(() => handleTileEvent(p, isDouble), 800);

        } catch (e) {
            console.error("Action Error:", e);
            addLog(`⚠️ 진행 오류: ${e.message}`);
            isMoving = false;
            if (p) p.isAnimating = false;
            document.getElementById('action-btn').disabled = false;
        }
    }

    async function moveStepByStep(player, steps, speedMs = 200, ignoreEvents = false) {
        if (!player) return;
        player.isAnimating = true;

        // 이 말을 실제로 조종하는 주체인지 확인
        let isController = (Number(player.id) === Number(myPlayerId)) || (isOnline && isHost && player.isAI) || !isOnline;
        if (isController) isMoving = true;

        try {
            let logPrefix = player.isAI ? '🤖' : '';
            for (let i = 0; i < steps; i++) {
                // 현재 위치를 숫자로 명확히 변환 후 증가
                let nextPos = (Number(player.pos) + 1) % 32;
                player.pos = nextPos;

                if (!ignoreEvents) {
                    if (boardState[player.pos] && boardState[player.pos].hasWeb) {
                        player.stoppedByWeb = true;
                        addLog(`${logPrefix}[${player.name}] 🕸️ 거미줄 정지!`);
                        boardState[player.pos].hasWeb = false;
                        boardState[player.pos].webTurns = 0;
                        updateBoardVisuals();
                        updatePiecePositions();
                        break;
                    }

                    // 폭탄 전이 로직
                    if (buildRule === 'fortune') {
                        players.forEach(other => {
                            if (Number(other.id) !== Number(player.id) && !other.isBankrupt && Number(other.pos) === Number(player.pos)) {
                                if (player.bombTurns > 0) {
                                    other.bombTurns = player.bombTurns; player.bombTurns = 0;
                                    updatePlayerUI();
                                } else if (other.bombTurns > 0) {
                                    player.bombTurns = other.bombTurns; other.bombTurns = 0;
                                    updatePlayerUI();
                                }
                            }
                        });
                    }

                    if(Number(player.pos) === 0) {
                        player.passCount = (Number(player.passCount) || 0) + 1;
                        let lapBonus = Math.floor((player.passCount - 1) / 3) * 100000;
                        let currentSalary = Number(baseSalary) + lapBonus;
                        let salary = player.salaryBoost ? currentSalary * 2 : currentSalary;

                        if (player.salaryStolenBy !== undefined && Number(player.salaryStolenBy) !== -1) {
                            let thief = players[Number(player.salaryStolenBy)];
                            if (thief) {
                                thief.money = Number(thief.money) + salary;
                                addLog(`💸 [${thief.name}]님이 [${player.name}]님의 월급을 훔쳤습니다. (${(salary/10000).toLocaleString()}만)`);
                            }
                            player.salaryStolenBy = -1;
                        } else {
                            player.money = Number(player.money) + salary;
                        addLog(`💰 [${player.name}] 월급 수령 (+${(salary/10000).toLocaleString()}만 원)`);
                        }
                        player.salaryBoost = false;
                        updatePlayerUI();
                        // [V5.0.7.0] 시작점 통과 시 중간 위치 전송 차단 (멈춤 방지)
                    }
                }
                updatePiecePositions();
                await new Promise(r => setTimeout(r, speedMs));
            }
        } catch (e) {
            console.error("MoveStep Error:", e);
            addLog(`⚠️ 이동 오류: ${e.message}`);
        } finally {
            player.isAnimating = false;
            player.moveSteps = 0;
            if (!isController) {
                isMoving = false; // 관찰자만 여기서 해제
            }
            if (isOnline && isController) pushOnlineState({ lastMoveType: 'walk' });
        }
    }

    function handleTileEvent(player, isDouble) {
        const pos = player.pos; const tileName = mapData[pos];
        let logPrefix = player.isAI ? '🤖' : '';
        
        // 거미줄에 의해 멈춘 경우 플래그 초기화 (타일 기능은 정상 수행)
        if (player.stoppedByWeb) {
            player.stoppedByWeb = false;
        }

        if (tileName === "무인도") {
            player.inIsland = true; player.islandTurns = 0; player.doubleCount = 0; player.isWorldTravel = false;
            addLog(`${logPrefix}[${player.name}] 무인도 갇힘 (더블 초기화)`);
            endTurnLogic(false);
        }
        else if (tileName === "세계여행") {
            player.isWorldTravel = true; player.doubleCount = 0;
            addLog(`${logPrefix}[${player.name}] 세계여행 대기 (더블 초기화)`);
            endTurnLogic(false);
        }
        else if (tileName === "시작") {
            if (buildRule === 'fortune') {
                let luckyBonus = Math.floor(initialStartingMoney * 0.1);
                player.money += luckyBonus;
                addLog(`🎯 [${player.name}] 시작점 정확히 착지! 행운 지원금 +${(luckyBonus/10000).toLocaleString()}만`);
                updatePlayerUI();
                if(isOnline) pushOnlineState();
                endTurnLogic(isDouble);
            } else {
                handleStartBuild(player, isDouble);
            }
        }
        else if (tileName === "로또방") {
            triggerLotto(player, isDouble, () => endTurnLogic(isDouble));
        }
        else if (tileName === "미스터리") {
            let r = Math.random();
            if (r < 0.40) drawTrapCard(player, isDouble);
            else if (r < 0.75) drawMercenaryCard(player, isDouble);
            else drawAngelGiftCard(player, isDouble);
        }
        else if (tileName === "보너스게임") {
            if(player.isAI) {
                handleBankruptcy(player, 100000, -1, false, -1, null, (success) => {
                    if(success) {
                        addLog(`🤖[${player.name}] 보너스 참가 (-10만)`); updatePlayerUI();
                        setTimeout(() => {
                            let r = Math.random();
                            if(r < 0.2) { addLog(`🤖[${player.name}] 보너스 실패`); endTurnLogic(isDouble); }
                            else if(r < 0.5) { player.money += 200000; addLog(`🤖[${player.name}] 보너스 1승 STOP (+20만)`); endTurnLogic(isDouble); }
                            else if(r < 0.8) { player.money += 400000; addLog(`🤖[${player.name}] 보너스 2승 STOP (+40만)`); endTurnLogic(isDouble); }
                            else { player.money += 800000; addLog(`🤖[${player.name}] 보너스 3연승! (+80만)`); endTurnLogic(isDouble); }
                        }, 1200);
                    } else endTurnLogic(isDouble);
                });
                return;
            }

            openCustomModal("🪙 보너스 게임", "동전 맞추기 게임", `<div style="font-size:14px; margin-top:10px;">참가비 <b>10만 원</b>이 자동으로 지불됩니다.</div>`, false, "입장하기", "", () => {
                handleBankruptcy(player, 100000, -1, false, -1, null, (success) => {
                    if(success) {
                        addLog(`[${player.name}] 보너스 참가 (-10만)`); updatePlayerUI();
                        let step = 1; let prizeMap = {1: 200000, 2: 400000, 3: 800000};
                        function coinGame() {
                            if(step > 3) { endTurnLogic(isDouble); return; }
                            openCustomModal("🪙 보너스 게임", "", `<div style="margin:10px 0; font-size:15px;">현재 <b>${step}단계</b> (성공 시 ${(prizeMap[step]/10000).toLocaleString()}만 원)<br><br>앞면/뒷면을 선택하세요!</div>`, true, "앞면", "뒷면", (isHeads) => {
                                let result = Math.random() < 0.5;
                                if (isHeads === result) {
                                    if (step === 3) { openCustomModal("🪙 올클리어!", "", `<div style="font-size:15px; margin:10px 0; font-weight:bold;">🎉 3단계 성공!<br>상금 ${(prizeMap[step]/10000).toLocaleString()}만 원을 획득했습니다!</div>`, false, "확인", "", () => { player.money += prizeMap[step]; addLog(`[${player.name}] 동전 3연승! (+${(prizeMap[step]/10000).toLocaleString()}만)`); endTurnLogic(isDouble); }); }
                                    else { openCustomModal("🪙 성공!", "", `<div style="margin:10px 0; font-size:14px;"><b>정답!</b> (동전: ${result ? '앞면' : '뒷면'})<br>확보 상금: <b>${(prizeMap[step]/10000).toLocaleString()}만 원</b><br>다음 도전을 하시겠습니까?</div>`, true, "도전 (GO)", "멈춤 (STOP)", (goNext) => { if (goNext) { step++; coinGame(); } else { player.money += prizeMap[step]; addLog(`[${player.name}] 보너스 STOP (+${(prizeMap[step]/10000).toLocaleString()}만)`); endTurnLogic(isDouble); } }); }
                                } else { openCustomModal("🪙 실패", "", `<div style="font-size:15px; margin:10px 0; color:#d32f2f; font-weight:bold;">❌ 아쉽습니다! 동전은 ${result ? '앞면' : '뒷면'}이었습니다.</div>`, false, "확인", "", () => { addLog(`[${player.name}] 보너스 실패`); endTurnLogic(isDouble); }); }
                            });
                        }
                        coinGame();
                    } else endTurnLogic(isDouble);
                });
            });
        }
        else if (tileName === "천사의 선물") {
            drawAngelGiftCard(player, isDouble);
        }
        else if (tileName === "국세청") {
            if (buildRule === 'fortune') {
                // [V6.3] 포츈 모드 전용: 부의 재분배 (로빈후드 시스템)
                let taxRate = 0.15; // 현재 자산의 15%
                let taxAmount = Math.floor((player.money * taxRate) / 10000) * 10000;
                if (taxAmount < 100000) taxAmount = 100000; // 최소 10만 원

                let others = players.filter(p => !p.isBankrupt && p.id !== player.id);
                let poorest = others.length > 0 ? others.sort((a, b) => a.money - b.money)[0] : null;

                let applyTax = () => {
                    handleBankruptcy(player, taxAmount, -1, false, -1, null, (success) => {
                        if (success) {
                            if (poorest) {
                                poorest.money += taxAmount;
                                addLog(`⚖️ [부의 재분배] [${player.name}]의 세금 ${(taxAmount/10000).toLocaleString()}만 원 → [${poorest.name}]에게 지원!`);
                            } else {
                                addLog(`🏢 [국세청] [${player.name}]님이 세금 ${(taxAmount/10000).toLocaleString()}만 원을 납부했습니다.`);
                            }
                            updatePlayerUI();
                            if(isOnline) pushOnlineState();
                        }
                        setTimeout(() => endTurnLogic(isDouble), 800);
                    });
                };

                if (player.isAI) {
                    setTimeout(applyTax, getRandomDelay());
                } else {
                    let desc = `<div style="text-align:left; font-size:14px;">현재 자산의 <b>15%</b>가 세금으로 징수되어<br>가장 어려운 플레이어에게 전달됩니다.<br><br>• 납부 세금: <b style="color:#d32f2f;">${(taxAmount/10000).toLocaleString()}만 원</b>${poorest ? `<br>• 지원 대상: <b>${poorest.name}</b>` : ""}</div>`;
                    openCustomModal("⚖️ 부의 재분배 (국세청)", "공정한 사회를 위한 세금 징수", desc, false, "세금 납부하기", "", applyTax);
                }
                return;
            }
            // 일반 모드 로직 (기존 유지)
            if(player.isAI) { handleBankruptcy(player, 200000, -1, false, -1, null, (success) => { if(success) { addLog(`🤖[${player.name}] 세금 20만 원 납부`); updatePlayerUI(); } setTimeout(() => endTurnLogic(isDouble), getRandomDelay()); }); return; }
            openCustomModal("🏢 국세청 도착", "세금 납부", `<div style="font-size:14px; margin-top:10px;">세금 <b>20만 원</b>을 납부해야 합니다.</div>`, false, "납부하기", "", () => { handleBankruptcy(player, 200000, -1, false, -1, null, (success) => { if(success) { addLog(`[${player.name}] 세금 20만 원 납부`); updatePlayerUI(); } endTurnLogic(isDouble); }); }); 
        }
        else if (tileName === "올림픽") { runOlympic(player, isDouble); }
        else if (tileName === "함정") {
            drawTrapCard(player, isDouble);
        }
        else if (tileName === "포츈카드") { drawFortuneCard(player, isDouble); }
        else if (islandTiles.includes(pos)) {
            let b = boardState[pos];
            if(b.owner === -1) handleIslandBuy(player, pos, isDouble);
            else if(isTeam(b.owner, player.id)) { addLog(`${logPrefix}[${player.name}] 내/팀 관광지 방문`); endTurnLogic(isDouble); }
            else processTollAndAcquire(player, pos, isDouble);
        }
        else { 
            let b = boardState[pos];
            if (b.owner === -1 || isTeam(b.owner, player.id)) {
                if(isTeam(b.owner, player.id) && b.landmark) { addLog(`${logPrefix}[${player.name}] 내/팀 랜드마크 방문`); endTurnLogic(isDouble); return; }
                showBuildModal(player, pos, isDouble);
            } else processTollAndAcquire(player, pos, isDouble);
        }
    }

    function triggerLotto(player, isDouble, callback) {
        let logPrefix = player.isAI ? '🤖' : '';
        let r = Math.random() * 100;
        let prize = 0, rank = "", congrats = "";
        if(r < 1) { prize = 50000000; rank = "1등 (5,000만)"; congrats = " 🎉 1등 당첨을 진심으로 축하합니다! 인생역전!"; }
        else if(r < 5) { prize = 5000000; rank = "2등 (500만)"; congrats = " 🎊 2등 당첨을 축하합니다! 대박 행운!"; }
        else if(r < 25) { prize = 1000000; rank = "3등 (100만)"; congrats = " 🎈 3등 당첨! 축하드립니다!"; }
        else if(r < 55) { prize = 500000; rank = "4등 (50만)"; congrats = " ✨ 4등 당첨! 소소한 행복!"; }

                if (callback) setTimeout(callback, 500);
            });
        } else {
            if (callback) setTimeout(callback, 1000);
        }
    }

    function drawTrapCard(player, isDouble = false) {
        const traps = [
            { id: 1, name: "무인도 감금 (즉시 이동 후 턴 종료)", short: "무인도 감금" },
            { id: 2, name: "행복나눔 (모두에게 자산 일부 기부)", short: "행복나눔" },
            { id: 3, name: "탈세 적발 (벌금 납부)", short: "탈세 벌금" },
            { id: 4, name: "지갑 분실 (현금 소실)", short: "지갑 분실" },
            { id: 5, name: "도박꾼 (단판 도박 - 결과에 따른 보상/페널티)", short: "단판 도박" }
        ];
        let trap = traps[Math.floor(Math.random() * traps.length)];
        let logPrefix = player.isAI ? '🤖' : '';

        let applyTrap = () => {
            addLog(`${logPrefix}[${player.name}] 함정: ${trap.short}`);
            if (trap.id === 1) {
                player.pos = 8; player.inIsland = true; player.islandTurns = 0; player.doubleCount = 0; player.isWorldTravel = false;
                updatePiecePositions(); updatePlayerUI();
                if (isOnline) pushOnlineState({ lastMoveType: 'jump' });
                endTurnLogic(false);
            } else if (trap.id === 2) {
                let recipients = players.filter(p => !p.isBankrupt && p.id !== player.id);
                let perPerson = getFortunePenalty(0.1); // 초기 자본의 10%
                let totalCost = recipients.length * perPerson;
                handleBankruptcy(player, totalCost, -1, false, -1, null, (succ) => {
                    if (succ) {
                        recipients.forEach(p => { p.money += perPerson; });
                        addLog(`${logPrefix}[${player.name}] 모두에게 총 ${(totalCost / 10000).toLocaleString()}만 원 기부`);
                    }
                    updatePlayerUI(); setTimeout(() => endTurnLogic(isDouble), 500);
                });
            } else if (trap.id === 3) {
                let amount = getFortunePenalty(0.25); // 초기 자본의 25%
                handleBankruptcy(player, amount, -1, false, -1, null, (succ) => {
                    if (succ) addLog(`${logPrefix}[${player.name}] 벌금 ${(amount/10000).toLocaleString()}만 원 납부 완료`);
                    updatePlayerUI(); setTimeout(() => endTurnLogic(isDouble), 500);
                });
            } else if (trap.id === 4) {
                let amount = getFortunePenalty(0.12); // 초기 자본의 12%
                handleBankruptcy(player, amount, -1, false, -1, null, (succ) => {
                    if (succ) addLog(`${logPrefix}[${player.name}] ${(amount/10000).toLocaleString()}만 원을 잃어버렸습니다.`);
                    updatePlayerUI(); setTimeout(() => endTurnLogic(isDouble), 500);
                });
            } else if (trap.id === 5) {
                let playGambler = (isHeads) => {
                    let result = Math.random() < 0.5;
                    let success = (isHeads === result);
                    let winAmt = getFortunePenalty(0.2); // 20%
                    let loseAmt = getFortunePenalty(0.15); // 15%
                    let resTxt = success ? `<b style="color:#00838f;">성공! (+${(winAmt/10000).toLocaleString()}만)</b>` : `<b style="color:#d32f2f;">실패... (-${(loseAmt/10000).toLocaleString()}만)</b>`;
                    let resultMsg = `<div style="font-size:16px; text-align:center; margin:15px 0;">동전 결과: <b>${result ? '앞면' : '뒷면'}</b><br><br>${resTxt}</div>`;

                    if(success) { player.money += winAmt; addLog(`${logPrefix}[${player.name}] 도박 성공! (+${(winAmt/10000).toLocaleString()}만)`); }
                    else { handleBankruptcy(player, loseAmt, -1, false, -1, null, (succ)=>{ if(succ) addLog(`${logPrefix}[${player.name}] 도박 실패... (-${(loseAmt/10000).toLocaleString()}만)`); }); }
                    updatePlayerUI();

                    if(!player.isAI) {
                        openCustomModal("🎲 도박 결과", "", resultMsg, false, "확인", "", () => {
                            setTimeout(()=>endTurnLogic(isDouble), 500);
                        });
                    } else {
                        setTimeout(()=>endTurnLogic(isDouble), 1000);
                    }
                };
                if(player.isAI) playGambler(Math.random() < 0.5);
                else {
                    openCustomModal("🎲 도박꾼의 선택", "단판 승부! 맞추면 50만 원, 틀리면 -30만 원", "앞면 혹은 뒷면을 선택하세요!", true, "앞면", "뒷면", (choice)=>playGambler(choice));
                }
            }
        };

        if (player.isAI) {
            setTimeout(applyTrap, getRandomDelay());
        } else {
            let html = `<div style="font-size:18px; font-weight:bold; color:#d32f2f; margin:15px 0;">🚨 함정 발동! 🚨<br><br>[ ${trap.name} ]</div>`;
            openCustomModal("💀 함정에 빠졌습니다!", "이런, 운이 없군요!", html, false, "으악!", "", applyTrap);
        }
    }

    function showBuildModal(player, pos, isDouble) {
        if (buildRule === 'fortune') { endTurnLogic(isDouble); return; }
        let b = boardState[pos], pData = propData[pos];
        currentBuildPlayerMoney = player.money; currentBuildLandOwned = b.land; currentBuildPos = pos;
        let hasOptions = false;

        let isRemote = (player.pos !== pos);
        let prefix = isRemote ? "원격 " : "";

        if(player.isAI) {
            let plan = getAIBuildPlan(player, pos, b, pData);
            if(plan.cost > 0) {
                handleBankruptcy(player, plan.cost, -1, true, pos, () => { endTurnLogic(isDouble); }, (success) => {
                    if(success) {
                        let buildNames = [];
                        if(plan.wL) { b.land = true; buildNames.push("부지"); }
                        if(plan.wV) { b.villa = true; buildNames.push("빌라"); }
                        if(plan.wB) { b.bldg = true; buildNames.push("빌딩"); }
                        if(plan.wH) { b.hotel = true; buildNames.push("호텔"); }
                        if(plan.wLm) { b.landmark = true; buildNames.push("랜드마크"); }
                        
                        if(b.owner === -1) b.owner = player.id; 
                        addLog(`🤖[${player.name}] ${prefix}자동건설(${buildNames.join(', ')}) (-${(plan.cost/10000).toLocaleString()}만)`); 
                        updateBoardVisuals(); 
                        checkMonopolyWarnings();
                        syncEffect('build', pos, { isRemote: isRemote });
                        if(checkMonopolyWinAndEnd(player)) return;
                    }
                    setTimeout(() => endTurnLogic(isDouble), getRandomDelay());
                });
            } else endTurnLogic(isDouble);
            return;
        }

        let maxLvl = getMaxBuildLevel(player); 
        let html = `<div style="text-align:left; display:inline-block; margin-top:10px; font-size:15px; line-height:1.8;">`;
        
        let msgLimit = buildRule === 'step' && maxLvl < 4 ? `<div style="color:#d32f2f; font-size:12px; margin-bottom:5px;">⚠️ 시작점을 ${player.passCount}번 통과하여 건설이 제한됩니다.</div>` : '';
        html += msgLimit;

        if (!b.land) { 
            html += `<label for="chk-land"><input type="checkbox" id="chk-land" checked disabled> 부지 (${pData.b[0]/10000}만)</label><br>`;
            if (maxLvl >= 1) { html += `<label for="chk-villa"><input type="checkbox" id="chk-villa" onchange="checkBuild('v')"> 빌라 (+${pData.b[1]/10000}만)</label><br>`; hasOptions = true; }
            if (maxLvl >= 2) { html += `<label for="chk-bldg"><input type="checkbox" id="chk-bldg" onchange="checkBuild('b')"> 빌딩 (+${pData.b[2]/10000}만)</label><br>`; hasOptions = true; }
            if (maxLvl >= 3) { html += `<label for="chk-hotel"><input type="checkbox" id="chk-hotel" onchange="checkBuild('h')"> 호텔 (+${pData.b[3]/10000}만)</label><br>`; hasOptions = true; }
            hasOptions = true; 
        } else if (!b.landmark) { 
            if(!b.villa && maxLvl >= 1) { html += `<label for="chk-villa"><input type="checkbox" id="chk-villa" onchange="checkBuild('v')"> 빌라 (+${pData.b[1]/10000}만)</label><br>`; hasOptions = true; }
            if(!b.bldg && maxLvl >= 2) { html += `<label for="chk-bldg"><input type="checkbox" id="chk-bldg" onchange="checkBuild('b')"> 빌딩 (+${pData.b[2]/10000}만)</label><br>`; hasOptions = true; }
            if(!b.hotel && maxLvl >= 3) { html += `<label for="chk-hotel"><input type="checkbox" id="chk-hotel" onchange="checkBuild('h')"> 호텔 (+${pData.b[3]/10000}만)</label><br>`; hasOptions = true; }
            
            if(b.hotel && maxLvl >= 4) { html += `<label for="chk-landmark"><input type="checkbox" id="chk-landmark" onchange="checkBuild('l')"> <b style="color:#d32f2f;">랜드마크 (+${pData.b[4]/10000}만)</b></label><br>`; hasOptions = true; }
        }
        
        if (!hasOptions) { endTurnLogic(isDouble); return; }

        html += `</div><div style="margin-top:15px; padding:10px; background:#e8f5e9; border:1px solid #c8e6c9; border-radius:5px; font-size:14px;">총 건설 비용: <b id="realtime-cost" style="color:#e65100;">0</b><b>만 원</b><br>내 잔여 자산: <b id="realtime-balance">0</b><b>만 원</b></div>`;
        let modalTitle = b.owner === -1 || b.owner === player.id ? "🔨 건설" : "🤝 팀원 지원 건설";
        let modalDesc = b.owner === -1 || b.owner === player.id ? `${mapData[pos]}에 건물을 짓겠습니까?` : `${players[b.owner].name}님의 땅에 대신 건물을 지어줍니다!`;

        openCustomModal(modalTitle, modalDesc, html, true, "건설하기", "패스", (confirm) => {
            if (confirm) {
                let cost = 0; let wLand = false, wVilla = false, wBldg = false, wHotel = false, wLmrk = false;
                if (!b.land) { cost += pData.b[0]; wLand = true; } 
                if (document.getElementById('chk-villa') && document.getElementById('chk-villa').checked) { cost += pData.b[1]; wVilla = true; } 
                if (document.getElementById('chk-bldg') && document.getElementById('chk-bldg').checked) { cost += pData.b[2]; wBldg = true; } 
                if (document.getElementById('chk-hotel') && document.getElementById('chk-hotel').checked) { cost += pData.b[3]; wHotel = true; } 
                if (document.getElementById('chk-landmark') && document.getElementById('chk-landmark').checked) { cost += pData.b[4]; wLmrk = true; }

                if (cost > 0) {
                    handleBankruptcy(player, cost, -1, true, pos, () => { showBuildModal(player, pos, isDouble); }, (success) => {
                        if(success) {
                            let buildNames = [];
                            if (wLand) { b.land = true; buildNames.push("부지"); }
                            if (wVilla) { b.villa = true; buildNames.push("빌라"); }
                            if (wBldg) { b.bldg = true; buildNames.push("빌딩"); }
                            if (wHotel) { b.hotel = true; buildNames.push("호텔"); }
                            if (wLmrk) { b.landmark = true; buildNames.push("랜드마크"); }
                            
                            if (b.owner === -1) b.owner = player.id; 
                            addLog(`🔨 [${player.name}] ${prefix}건설 완료 (${buildNames.join(', ')}) (-${(cost/10000).toLocaleString()}만 원)`);
                            updateBoardVisuals(); 
                            checkMonopolyWarnings();
                            syncEffect('build', pos, { isRemote: isRemote });
                            if(checkMonopolyWinAndEnd(player)) return;
                        }
                        setTimeout(() => endTurnLogic(isDouble), 1000);
                    });
                    return; 
                }
            }
            setTimeout(() => endTurnLogic(isDouble), 1000);
        });
        setTimeout(updateBuildCostDisplay, 10);
    }

    function shuffleMysteryTiles() {
        if (buildRule !== 'fortune') return;
        // 온라인 모드라면 방장만 타일을 섞고 결과를 공유함
        if (isOnline && !isHost) return;

        // 고정 칸: 시작, 로또방, 무인도, 포츈x3, 세계여행, 국세청 (16번 올림픽은 셔플 포함)
        const fixed = [0, 2, 8, 12, 20, 24, 28, 30];
        let available = [];
        for(let i=0; i<32; i++) { if(!fixed.includes(i)) available.push(i); }

        // Shuffle available slots
        for (let i = available.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [available[i], available[j]] = [available[j], available[i]];
        }

        // 3라운드마다 미스터리 칸 1개씩 추가 (4라운드부터 6개, 7라운드부터 7개...)
        let mysteryCount = 5 + Math.floor((Number(currentRound) - 1) / 3);
        const newMystery = available.slice(0, Math.min(mysteryCount, available.length));

        for(let i=0; i<32; i++) {
            if(fixed.includes(i)) continue;

            if(newMystery.includes(i)) {
                mapData[i] = "미스터리";
            } else {
                mapData[i] = "포츈카드";
            }
        }

        addLog(`📢 라운드 ${currentRound}: 맵이 재배치되었습니다! (미스터리 ${mysteryCount}개)`);
        updateBoardVisuals();
        // pushOnlineState 제거: endTurnLogic에서 최종 상태와 함께 전송함
    }

    function endTurnLogic(isDouble, forceEnd = false) {
        if (!players || players.length === 0) return; 
        
        // [V5.9.8.5] 타게팅 UI 강제 청소 (새 카드 추가 대비 필수 로직)
        cancelTargetingUI();
        cancelPlayerTargetingUI();

        // [V5.0.8.8] 폭탄 카운트다운 (턴 종료 시 - 누가 들고 있든 무조건 차감)
        if (buildRule === 'fortune') {
            let bombCarrier = players.find(pl => pl.bombTurns > 0 && !pl.isBankrupt);
            if (bombCarrier) {
                bombCarrier.bombTurns--;
                if (bombCarrier.bombTurns === 0) {
                    let loss = Math.floor((bombCarrier.money * 0.3) / 10000) * 10000;
                    handleBankruptcy(bombCarrier, loss, -1, false, -1, null, (succ) => {
                        if (succ) {
                            addLog(`💥 [${bombCarrier.name}] 폭탄 투쾅!! 자산 30% 손실 (-${(loss/10000).toLocaleString()}만)`);
                        }
                        playQuakeEffect(bombCarrier.pos);
                        updatePlayerUI();
                        if (isOnline) pushOnlineState();
                    });
                }
            }
        }

        // 거미줄 턴수 관리
        if (buildRule === 'fortune') {
            boardState.forEach(b => {
                if (b.hasWeb && b.webTurns > 0) {
                    b.webTurns--;
                    if (b.webTurns === 0) b.hasWeb = false;
                }
            });
        }

        let alive = players.filter(p => !p.isBankrupt);
        let isTeamGame = isTeamGameGlobal;
        let activeTeams = new Set(alive.map(p => p.team));
        
        // [수정] 마지막 플레이어 확인 로직 강화
        let lastActiveIdx = 0;
        for(let i=players.length-1; i>=0; i--) { if(players[i] && !players[i].isBankrupt) { lastActiveIdx = i; break; } }

        let shouldEnd = forceEnd || alive.length <= 1 || (isTeamGame && activeTeams.size <= 1) || (Number(currentTurn) === lastActiveIdx && Number(currentRound) >= Number(maxRounds));

        if (shouldEnd) {
            let endReason = (currentTurn === lastActiveIdx && currentRound >= maxRounds) ? "⏳ 턴 횟수 종료" : "💥 파산으로 인한 종료";
            let rankings = players.map(p => {
                if (p.isBankrupt) return { id: p.id, team: p.team, name: p.name, total: 0, isBankrupt: true, color: p.color };
                let propertyValue = 0; boardState.forEach((b, i) => { if (b.owner === p.id) propertyValue += getCost(i); });
                return { id: p.id, team: p.team, name: p.name, total: p.money + propertyValue, isBankrupt: false, color: p.color };
            });

            let rankHtml = `<div style="font-size:14px; font-weight:bold; color:#d32f2f; margin-bottom:10px;">[ ${endReason} ]</div>`;
            if (isTeamGame) {
                let t1 = rankings.filter(r => r.team === 1); let t2 = rankings.filter(r => r.team === 2);
                let tRank = [
                    { team: "팀 A", names: t1.map(r=>r.name).join(', '), total: t1.reduce((sum, r)=>sum+r.total, 0), color: '#ff5252' },
                    { team: "팀 B", names: t2.map(r=>r.name).join(', '), total: t2.reduce((sum, r)=>sum+r.total, 0), color: '#448aff' }
                ];
                tRank.sort((a, b) => b.total - a.total);
                rankHtml += tRank.map((r, i) => `<div style="padding:10px; border-bottom:1px solid #eee; background:${i === 0 ? '#fff9c4' : 'transparent'};">${(i === 0) ? '🏆 <b>최종 우승</b>' : '🥈 <b>준우승</b>'} <span style="color:${r.color}">[${r.team}]</span> (${r.names})<br>합산 자산: <b>${(r.total/10000).toLocaleString()}만 원</b></div>`).join('');
            } else {
                rankings.sort((a, b) => b.total - a.total);
                rankHtml += rankings.map((r, i) => `<div style="padding:10px; border-bottom:1px solid #eee; background:${i === 0 ? '#fff9c4' : 'transparent'};">${(i === 0) ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : '🎖️'))} <b style="color:${r.color}">${r.name}</b>: <b>${(r.total/10000).toLocaleString()}만 원</b>${r.isBankrupt ? ' (파산)' : ''}</div>`).join('');
            }

            if (isOnline) {
                database.ref('rooms/' + onlineRoomId).update({
                    gameEnded: true,
                    endRankHtml: rankHtml,
                    lastActionTime: Date.now()
                });
            }

            openCustomModal(`🎉 게임 종료`, "최종 자산 결과입니다.", rankHtml, false, "다시 하기", "", () => { resetGameForEnd(); });
            document.getElementById('action-btn').disabled = true; return;
        }

        if (!isDouble || forceEnd || players[currentTurn].isBankrupt) {

            let loopSafe = 0; 
            let roundIncreased = false;
            do {
                currentTurn = (currentTurn + 1) % players.length; 
                if (currentTurn === 0) {
                    currentRound++;
                    roundIncreased = true;
                }
                loopSafe++; 
            } while (players[currentTurn].isBankrupt && loopSafe < 10);

            // [수정] 턴이 완전히 결정된 후에 맵을 섞어야 싱크가 맞음 (V4.6.13)
            if (roundIncreased && buildRule === 'fortune' && (!isOnline || isHost)) {
                shuffleMysteryTiles();
            }
        }
        
        // [V5.9.8.1] 상태 해제 순서 최적화: 잠금을 먼저 풀어야 AI/사람 버튼이 활성화됨
        isMoving = false;
        aiThinking = false;
        players.forEach(pl => { if(pl) { pl.isAnimating = false; pl.hasUsedCardThisTurn = false; } });

        updatePlayerUI();
        updateRoundUI(isDouble);

        triggerAITurn();

        // [V4.7.4 수정] 턴과 라운드 정보를 명시적으로 전달하여 전송 권한을 확보함
        if(isOnline) {
            pushOnlineState({
                currentTurn: currentTurn,
                currentRound: currentRound
            });
        }
    }

                if(i === olympicTile) dispName += ` <span style="color:#e91e63; font-size:10px;">🏅x${olympicMult}</span>`;

                let colorMult = getColorMultiplier(i, b.owner);
                if (colorMult > 1 && b.owner !== -1 && players[b.owner]) {
                    let p = players[b.owner];
                    let prefix = isTeamGame ? (p.team === 1 ? "A팀 " : "B팀 ") : `<span style="color:${p.color}; text-shadow: 0 0 2px rgba(0,0,0,0.5); font-size:14px;">●</span> `;

                if(b.blackoutTurns > 0) dispName += ` <br><span style="color:#ffffff; font-size:11px; font-weight:bold; background:#212121; padding:1px 3px; border-radius:3px;">⚡정전(${b.blackoutTurns}턴)</span>`;

                if(!targetingMode.active) elName.innerHTML = dispName;

                if(b.owner !== -1 && isMonopolized(i, b.owner)) {
                    el.classList.add(`monopoly-p${b.owner}`);
                }

                if(isSpecialTile(i) && !islandTiles.includes(i)) continue;
                let buildArea = document.getElementById(`build-${i}`), ownerLine = document.getElementById(`oline-${i}`);
                if(!buildArea || !ownerLine) continue;

                if(b.owner !== -1 && players[b.owner]) {
                    ownerLine.style.background = players[b.owner].color;

                    if(b.landmark) {

                            buildArea.innerHTML = `<img src="${i}_landmark.png" class="landmark-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';"><span class="b-l" style="display:none;">🏰</span>`;
                        } else { buildArea.innerHTML = '<span class="b-l">🏰</span>'; }
                    }
                    else if(islandTiles.includes(i)) {
                        let ownerIslands = islandTiles.filter(idx => isTeam(boardState[idx].owner, b.owner)).length;
                        buildArea.innerHTML = `<span class="b-l">${(ownerIslands === 2) ? '🌴' : (ownerIslands >= 3 ? '🏖️' : '🏝️')}</span>`;
                    }
                        else {
                        let bHtml = '';
                        if(!b.villa && !b.bldg && !b.hotel) {
                            bHtml = '<span style="font-size:16px; margin-bottom: 2px; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5));">🚩</span>';
                        } else {
                            // 현재 어떤 건물이 있는지에 따라 크기 클래스 결정 (V5.9.9 요청 사항 반영)
                            let vClass = "size-villa-sub", blClass = "size-villa-sub", hClass = "size-villa-sub";

                            if (b.hotel) {
                                vClass = "size-tiny";      // 빌라는 많이 작게 (11px)
                                blClass = "size-bldg-sub"; // 빌딩은 크게 (18px)
                                hClass = "size-hotel";      // 호텔은 작게 (28px)
                            } else if (b.bldg) {
                                vClass = "size-tiny";      // 빌라는 많이 작게 (11px)
                                blClass = "size-bldg";     // 빌딩은 호텔보다 작게 (24px)
                            } else if (b.villa) {
                                vClass = "size-villa";     // 빌라만 있을 땐 빌딩보다 작게 (20px)
                            }

                            if (buildRule !== 'fortune') {
                                if(b.villa) bHtml += `<img src="villa.png" class="building-img ${vClass}" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';"><span class="b-icon" style="display:none; font-size:${vClass==='size-lg'?'22px':(vClass==='size-md'?'18px':'12px')};">🏠</span>`;
                                if(b.bldg) bHtml += `<img src="building.png" class="building-img ${blClass}" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';"><span class="b-icon" style="display:none; font-size:${blClass==='size-lg'?'24px':(blClass==='size-md'?'18px':'14px')};">🏢</span>`;
                                if(b.hotel) bHtml += `<img src="hotel.png" class="building-img ${hClass}" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';"><span class="b-icon" style="display:none; font-size:${hClass==='size-lg'?'30px':(hClass==='size-md'?'22px':'16px')};">🏨</span>`;
                            } else {
                                if(b.villa) bHtml += `<span class="b-icon ${vClass}">🏠</span>`;
                                if(b.bldg) bHtml += `<span class="b-icon ${blClass}">🏢</span>`;
                                if(b.hotel) bHtml += `<span class="b-icon ${hClass}">🏨</span>`;
                            }
                        }
                        buildArea.innerHTML = bHtml;
                    }
                } else {
                    ownerLine.style.background = 'transparent'; ownerLine.style.borderTop = 'none'; buildArea.innerHTML = '';
                }
            }
        } catch(e) { console.error("updateBoardVisuals Error:", e); }
    }

    function updatePiecePositions() {
        const size = 720, cSize = 80;
        players.forEach((p, i) => {
            let el = document.getElementById('p-' + p.id); if(p.isBankrupt || !el) return;
            let idx = p.pos, x, y;
            if (idx < 8) { x = size - cSize - (idx * cSize); y = size - cSize; } 
            else if (idx < 16) { x = 0; y = size - cSize - ((idx - 8) * cSize); } 
            else if (idx < 24) { x = (idx - 16) * cSize; y = 0; } 
            else { x = size - cSize; y = (idx - 24) * cSize; }
            
            const offsets = [[10, 10], [40, 10], [10, 40], [40, 40]]; 
            el.style.left = (x + offsets[i][0]) + 'px'; 
            el.style.top = (y + offsets[i][1]) + 'px';
        });
    }

    function showMonopolyToast(msg, targetIndices = []) {
        const toast = document.getElementById('monopoly-toast');
        if(!toast) return;

        // 이전 반짝임 제거
        document.querySelectorAll('.warning-flash').forEach(el => el.classList.remove('warning-flash'));

        // 타겟 땅 반짝임 적용
        targetIndices.forEach(idx => {
            let el = document.getElementById(`cell-box-${idx}`);
            if(el) el.classList.add('warning-flash');
        });

        toast.innerHTML = msg;
        toast.style.display = 'block';
        toast.classList.remove('toast-anim');
        void toast.offsetWidth;
        toast.classList.add('toast-anim');

        setTimeout(() => {
            toast.style.display = 'none';
            // 반짝임 제거
            targetIndices.forEach(idx => {
                let el = document.getElementById(`cell-box-${idx}`);
                if(el) el.classList.remove('warning-flash');
            });
        }, 2500);
    }

    function checkMonopolyWarnings() {
        if (buildRule === 'fortune') return;

        let isTeamMode = document.querySelector('input[name="mode-radio"]:checked').value === 'team';
        let groupsToCheck = isTeamMode ? [1, 2] : players.filter(p => !p.isBankrupt).map(p => p.id);

        groupsToCheck.forEach(gid => {
            let pIds = isTeamMode ? players.filter(p => p.team === gid).map(p => p.id) : [gid];
            let name = isTeamMode ? (gid === 1 ? "A팀" : "B팀") : players[gid].name;

            const isTeammate = (oid) => isTeam(oid, pIds[0]);

            // 1. 관광지 독점 경고
            let myIslands = islandTiles.filter(idx => isTeammate(boardState[idx].owner));
            if (myIslands.length === 4) {
                let missingIdx = islandTiles.find(idx => !isTeammate(boardState[idx].owner));
                if (boardState[missingIdx].owner === -1) {
                    showMonopolyToast(`⚠️ 위기: ${name} 관광지 독점까지 단 1곳!<br><span style="color:#ffeb3b;">[${mapData[missingIdx]}]</span>을(를) 사수하세요!`, [missingIdx]);
                    addLog(`<span style="color:#d32f2f; font-weight:bold;">⚠️ 경고: ${name} 관광지 독점 주의 (${mapData[missingIdx]})</span>`);
                }
            }

            // 2. 라인 독점 경고
            lineGroups.forEach((lg, lIdx) => {
                let mine = lg.filter(idx => isTeammate(boardState[idx].owner));
                if (mine.length === lg.length - 1) {
                    let missingIdx = lg.find(idx => !isTeammate(boardState[idx].owner));
                    let b = boardState[missingIdx];
                    if (b.owner === -1 || (!b.landmark && !islandTiles.includes(missingIdx))) {
                        showMonopolyToast(`⚠️ 위기: ${name} ${lIdx+1}라인 독점 임박!<br><span style="color:#ffeb3b;">[${mapData[missingIdx]}]</span>을(를) 방어하세요!`, [missingIdx]);
                        addLog(`<span style="color:#d32f2f; font-weight:bold;">⚠️ 경고: ${name} ${lIdx+1}라인 독점 주의 (${mapData[missingIdx]})</span>`);
                    }
                }
            });

            // 3. 컬러 독점 경고
            let myMonopCount = 0;
            colorGroups.forEach(cg => { if(cg.every(idx => isTeammate(boardState[idx].owner))) myMonopCount++; });

            if (myMonopCount >= 2) {
                colorGroups.forEach(cg => {
                    let mine = cg.filter(idx => isTeammate(boardState[idx].owner));
                    if (mine.length === cg.length - 1) {
                        let missingIdx = cg.find(idx => !isTeammate(boardState[idx].owner));
                        let b = boardState[missingIdx];
                        if (b.owner === -1 || !b.landmark) {
                            showMonopolyToast(`⚠️ 위기: ${name} 트리플 컬러 독점 직전!<br><span style="color:#ffeb3b;">[${mapData[missingIdx]}]</span> 인수를 저지하세요!`, [missingIdx]);
                            addLog(`<span style="color:#d32f2f; font-weight:bold;">⚠️ 경고: ${name} 트리플 컬러 독점 주의 (${mapData[missingIdx]})</span>`);
                        }
                    }
                });
            }
        });
    }

        applyRandomNames(); // 랜덤 이름 적용
        applyRandomRoomId(); // 랜덤 방 번호 적용
        updatePlayerInputs(); // 플레이어 입력 칸 초기화
        setTimeout(() => {
            if (document.getElementById('setup').style.display !== 'none') {
                showUpdateNotes();
                updatePublicRoomList();
            }
        }, 500);
    };
</script>
